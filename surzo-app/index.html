  <meta name="surzo-version" content="2026-05-13-7" />
  <title>Surzo</title>
  <script>
    // Force-update mechanism: poll the live HTML every 60s, compare version meta.
    // If changed, reload the page so the user always has the latest version.
    (function() {
      const CURRENT_VERSION = '2026-05-13-7';
      let checking = false;
      async function checkVersion() {
        if (checking) return;
        checking = true;
        try {
          const res = await fetch(location.pathname + '?v=' + Date.now(), {
            cache: 'no-store',
            headers: { 'Cache-Control': 'no-cache' },
          });
          if (!res.ok) return;
          const html = await res.text();
          const m = html.match(/<meta name="surzo-version" content="([^"]+)"/);
          if (m && m[1] && m[1] !== CURRENT_VERSION) {
            // New version detected — hard reload to apply
            console.log('[surzo] new version detected, reloading:', m[1]);
            location.reload();
          }
        } catch (_e) {}
        finally { checking = false; }
      }
      // Check on initial load (after 5s) and then every 60s, plus on visibility
      setTimeout(checkVersion, 5000);
      setInterval(checkVersion, 60_000);
      document.addEventListener('visibilitychange', () => { if (!document.hidden) checkVersion(); });
    })();
  </script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // ─── Supabase ────────────────────────────────────────────────────────────
    const SUPABASE_URL = 'https://usegniivddmbjkkceqcc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzZWduaWl2ZGRtYmpra2NlcWNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgyOTYzODksImV4cCI6MjA5Mzg3MjM4OX0.sm-Fvu1xI_Ul8iEWUez3rAW4IYBV0BGYRciUCH5ucu4';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {

    async function getUserId() {
      const { data: { user } } = await sb.auth.getUser();

    // ─── Constants ───────────────────────────────────────────────────────────
    const CATEGORIES = ['Programming','Writing','Design','Research','Study','Admin / Email','Free Work','General Work'];

    // ─── Utils ───────────────────────────────────────────────────────────────
    function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
    function fmtTimer(sec) {
      const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
      if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }
    function fmtMin(m) {
      if (m < 60) return `${Math.round(m)}m`;
      const h = Math.floor(m/60), mm = Math.round(m%60);
      return mm > 0 ? `${h}h ${mm}m` : `${h}h`;
    }
    function fmtPts(n) {
      if (!n) return '0';
      if (n >= 1_000_000) return `${(n/1_000_000).toFixed(1)}M`;
      if (n >= 10_000)    return `${Math.round(n/1000)}k`;
      if (n >= 1_000)     return `${(n/1000).toFixed(1)}k`;
      return String(Math.round(n));
    }
    function isToday(ts) {
      const d = new Date(ts), n = new Date();
      return d.getFullYear()===n.getFullYear() && d.getMonth()===n.getMonth() && d.getDate()===n.getDate();
    }

    const COLOR_STOPS = [
      [0,   [244, 63,  94 ]], [20,  [251, 146, 60 ]], [38,  [251, 191, 36 ]],
      [55,  [52,  211, 153]], [75,  [34,  211, 238]], [100, [96,  165, 250]],
    ];
    function lvf(a,b,t) { return Math.round(a+(b-a)*t); }
    function scoreColor(s) {
      const v = Math.max(0, Math.min(100, s ?? 0));
      for (let i = 0; i < COLOR_STOPS.length - 1; i++) {
        const [s0, c0] = COLOR_STOPS[i], [s1, c1] = COLOR_STOPS[i+1];
        if (v <= s1) {
          const t = (v - s0) / (s1 - s0);
          return `rgb(${lvf(c0[0],c1[0],t)},${lvf(c0[1],c1[1],t)},${lvf(c0[2],c1[2],t)})`;
        }
      }
      return 'rgb(96,165,250)';
    }
    function getZone(s) {
      const color = scoreColor(s);
      if (s >= 85) return { label: 'DEEP FOCUS', color };
      if (s >= 70) return { label: 'ON TRACK',   color };
      if (s >= 55) return { label: 'FOCUSED',    color };
      if (s >= 38) return { label: 'DRIFTING',   color };
      if (s >= 20) return { label: 'OFF TASK',   color };
      return         { label: 'DISTRACTED', color };
    }

    // ─── Scoring ─────────────────────────────────────────────────────────────
    function calcLiveScore(elapsedMin, phoneCount, phoneMins) {
      const base = 75;
      const penalty = Math.min(35, phoneCount * 5 + phoneMins * 0.8);
      return Math.round(Math.max(15, base - penalty));
    }
    function calcMobileScore(durMin, phoneCount, phoneMins) {
      const phoneRatio = durMin > 0 ? phoneMins/durMin : 0;
      const distractRate = durMin > 0 ? phoneCount/durMin : 0;
      const focus   = Math.max(0, 100 - phoneRatio*120 - distractRate*600);
      const endur   = Math.min(100, 50 + durMin*1.2);
      const recov   = Math.max(0, 100 - phoneCount*8);
      const consist = Math.max(0, 100 - phoneRatio*100);
      const w = focus*0.40 + endur*0.25 + recov*0.20 + consist*0.15;
      return Math.round(Math.max(10, Math.min(99, w)));
    }
    function buildFeedback(durMin, phoneCount, phoneMins, score) {
      const phoneRatio = durMin > 0 ? phoneMins/durMin : 0;
      const breakdown = {
        focusConsistency: Math.max(0, 100 - phoneRatio*120),
        taskAlignment:    durMin >= 25 ? 80 : Math.min(80, durMin*3),
        deepWorkRatio:    phoneCount <= 1 ? 90 : Math.max(10, 90 - phoneCount*12),
        activitySignal:   Math.min(100, 50 + durMin*1.5),
        recoveryReturn:   Math.max(0, 100 - phoneCount*10),
        distractionPenalty: Math.min(30, phoneCount*4),
      };
      const hour = new Date().getHours();
      const isMorning = hour >= 5 && hour < 11, isLate = hour >= 22 || hour < 5;
      const rnd = arr => arr[Math.floor(Math.random() * arr.length)];
      const pos = [], neg = [];

      // ── POSITIVES (specific) ────────────────────────────────────────────
      if (score >= 85) {
        pos.push(rnd([
          `平均スコア${score}は上位5%レベル。${durMin}分の中で深い集中が複数回成立した証拠。`,
          `スコア${score}でフィニッシュ。同じ条件をテンプレ化して再現を狙おう。`,
        ]));
      } else if (score >= 70) {
        pos.push(rnd([
          `安定したavg${score}。${durMin}分間、大崩れせずに走り切れた。`,
          `スコア${score}は実用レベル。この土台があれば毎日積み上がる。`,
        ]));
      } else if (score >= 55) {
        pos.push(`avg${score}で着地。${durMin}分続いたのは事実。ここから上が次の課題。`);
      } else if (score >= 40) {
        pos.push(`${durMin}分の作業を完走した。スコア${score}は環境ノイズの影響が大きかった可能性。`);
      } else {
        pos.push(`スコア${score}でも記録できたこと自体が次への材料。`);
      }

      if (phoneCount === 0 && durMin >= 20) {
        pos.push(`${durMin}分間スマホ触らずに完走。これが標準になればスコアは自然と上がる。`);
      } else if (phoneCount === 1) {
        pos.push(`スマホは1回だけ。すぐ戻った復元力は評価できる。`);
      }
      if (durMin >= 60 && score >= 55) {
        pos.push(`${durMin}分の長時間セッション完遂。脳の集中持久力は確実についている。`);
      } else if (durMin >= 25 && score >= 70 && phoneCount === 0) {
        pos.push(`25分以上 × ノースマホ × avg${score} — これがあなたのベストパターン。`);
      }
      if (isMorning && score >= 70) {
        pos.push("朝イチでこのスコア。1日の波を作る上で理想的な滑り出し。");
      }

      // ── NEGATIVES (specific data + concrete action) ─────────────────────
      if (phoneCount >= 5) {
        neg.push(`スマホ${phoneCount}回・合計${Math.round(phoneMins)}分。次回はスマホを別の部屋／引き出しに物理的に隔離。机に置いてあるだけで集中力は20%落ちる研究データもある。`);
      } else if (phoneCount >= 3) {
        neg.push(`スマホ${phoneCount}回 (約${Math.round(phoneMins)}分)。次回は25分のphone-freeブロックを1本作ることから始めよう。`);
      } else if (phoneRatio > 0.15) {
        neg.push(`時間の${Math.round(phoneRatio * 100)}%をスマホに使った。1回戻ってきても集中の立ち上げに3-5分かかるのを忘れずに。`);
      }

      if (durMin < 15) {
        neg.push(`${durMin}分のセッションは深い集中が立ち上がる前。脳の集中モードに入るには10-15分かかるので、最低でも25分は粘りたい。`);
      } else if (durMin < 25 && score < 60) {
        neg.push(`${durMin}分でスコア${score}。あと10分粘って合計25分やれば、avg${score + 10}前後まで上がる可能性が高い。`);
      }

      if (score < 50 && phoneCount < 3) {
        neg.push(`スマホ要因以外でスコアが低い。開始前に関係ないアプリ・タブを物理的に閉じ、1つのアプリだけで20分続ける「シングルアプリチャレンジ」を試そう。`);
      }

      if (isLate && score < 60) {
        neg.push("22時以降のセッションは平均スコアが下がりがち。同じ作業を翌朝6-10時に動かすと、データ的にはスコアが10-20上がる人が多い。");
      }

      if (pos.length === 0) pos.push("セッションを完了しました");
      return { pos: pos.slice(0, 3), neg: neg.slice(0, 2), breakdown };
    }

    // ─── Storage ─────────────────────────────────────────────────────────────
    async function getSessions() {
      const uid = await getUserId();
      if (!uid) return [];
      const [{ data }, { data: photos }] = await Promise.all([
        sb.from('sessions').select('data').eq('user_id', uid).order('created_at', { ascending: false }),
        sb.from('session_photos').select('session_id, photo_url').eq('user_id', uid),
      ]);
      const photoMap = Object.fromEntries((photos ?? []).map(p => [p.session_id, p.photo_url]));
      return (data ?? []).map(r => {
        const s = r.data;
        if (!s.photoUri?.startsWith('https://') && photoMap[s.id]) s.photoUri = photoMap[s.id];
        return s;
      });
    }
    async function saveSession(session) {
      const uid = await getUserId();
      if (!uid) return;
      await sb.from('sessions').upsert({
        id: session.id, user_id: uid, data: session, updated_at: new Date().toISOString(),
      });
    }
    async function uploadPhoto(sessionId, file) {
      const uid = await getUserId();
      if (!uid) return null;
      const { data: { session } } = await sb.auth.getSession();
      const token = session?.access_token;
      if (!token) return null;
      const ts = Date.now();
      const path = `${uid}/${sessionId}_${ts}.jpg`;
      const fd = new FormData();
      fd.append('file', file, `${sessionId}_${ts}.jpg`);
      const res = await fetch(`${SUPABASE_URL}/storage/v1/object/session-photos/${path}`, {
        method: 'POST', headers: { Authorization: `Bearer ${token}`, 'x-upsert': 'true' }, body: fd,
      });
      if (!res.ok) { console.warn('upload failed', res.status); return null; }
      const { data: pub } = sb.storage.from('session-photos').getPublicUrl(path);
      return pub.publicUrl;
    }
    async function addSessionPhoto(sessionId, photoUrl) {
      if (!photoUrl?.startsWith('https://')) return;
      const uid = await getUserId();
      if (!uid) return;
      const { count } = await sb.from('session_photo_gallery')
        .select('*', { count: 'exact', head: true }).eq('session_id', sessionId);
      const isFirst = (count ?? 0) === 0;
      try {
        await sb.from('session_photo_gallery').upsert(
          { session_id: sessionId, user_id: uid, photo_url: photoUrl, is_cover: isFirst },
          { onConflict: 'session_id,photo_url' }
        );
      } catch (_e) {}
      if (isFirst) {
        await sb.from('session_photos').upsert({ session_id: sessionId, user_id: uid, photo_url: photoUrl });
        try {
          const { data: row } = await sb.from('sessions').select('data').eq('id', sessionId).maybeSingle();
          if (row?.data) {
            await sb.from('sessions').update({
              data: { ...row.data, photoUri: photoUrl }, updated_at: new Date().toISOString(),
            }).eq('id', sessionId);
          }
        } catch (_e) {}
      }
    }
    async function sendPhoneEvent(sessionId, type) {
      const uid = await getUserId();
      if (!uid) return;
      await sb.from('phone_events').insert({
        user_id: uid, session_id: sessionId, type, ts: new Date().toISOString(),
      });
    }
    // Cached for sendBeacon: avoids async auth lookup when page is being suspended
    let _cachedUid = null;
    let _cachedToken = null;
    async function refreshAuthCache() {
      try {
        _cachedUid = await getUserId();
        const { data: { session } } = await sb.auth.getSession();
        _cachedToken = session?.access_token ?? null;
      } catch (_e) {}
    }
    function sendPhoneEventBeacon(sessionId, type) {
      // Reliable send when page is going hidden — uses Beacon API which iOS Safari honors during suspend
      if (!_cachedUid || !_cachedToken) return false;
      try {
        const body = JSON.stringify({
          user_id: _cachedUid, session_id: sessionId, type, ts: new Date().toISOString(),
        });
        const blob = new Blob([body], { type: 'application/json' });
        const url = `${SUPABASE_URL}/rest/v1/phone_events`;
        const headers = {
          apikey: SUPABASE_ANON_KEY,
          Authorization: `Bearer ${_cachedToken}`,
          'Content-Type': 'application/json',
        };
        // sendBeacon doesn't support custom headers, so we use fetch with keepalive
        return fetch(url, { method: 'POST', headers, body, keepalive: true }).then(() => true).catch(() => false);
      } catch (_e) { return false; }
    }
    async function sendSessionCommand(command, data = {}) {
      const uid = await getUserId();
      if (!uid) return;
      await sb.from('session_commands').insert({ user_id: uid, command, data });
    }

    // ─── Social (real users) ────────────────────────────────────────────────
    async function ensureMyProfile() {
      const uid = await getUserId();
      if (!uid) return null;
      const { data: { user } } = await sb.auth.getUser();
      const email = user?.email || '';
      const handle = email.split('@')[0] || 'user';
      await sb.from('user_profiles').upsert({
        id: uid, email_handle: handle, display_name: handle,
      }, { onConflict: 'id', ignoreDuplicates: true });
      const { data } = await sb.from('user_profiles').select('*').eq('id', uid).maybeSingle();
      return data;
    }
    async function refreshMyProfileStats() {
      const uid = await getUserId();
      if (!uid) return;
      try {
        const sessions = await getSessions();
        if (!sessions?.length) return;
        const total = sessions.reduce((s, x) => s + calcTotal(x), 0);
        const avg = Math.round(sessions.reduce((s, x) => s + (x.averageWorkScore || 0), 0) / sessions.length);
        const now = Date.now();
        const today = sessions.filter(x => x.startedAt && isToday(x.startedAt));
        const dailyPts = today.reduce((s, x) => s + calcTotal(x), 0);
        const dailyAvg = today.length ? Math.round(today.reduce((s, x) => s + (x.averageWorkScore || 0), 0) / today.length) : 0;
        const todayISO = new Date(now).toISOString().slice(0, 10);
        const last = sessions[0];
        // Base columns (always exist)
        await sb.from('user_profiles').update({
          total_pts: total, avg_score: avg, sessions_count: sessions.length,
          last_session_at: last?.startedAt ? new Date(last.startedAt).toISOString() : null,
          updated_at: new Date().toISOString(),
        }).eq('id', uid);
        // Daily columns (may not exist if SQL not run)
        try {
          await sb.from('user_profiles').update({
            daily_pts: dailyPts, daily_avg: dailyAvg, daily_sessions: today.length, daily_date: todayISO,
          }).eq('id', uid);
        } catch (_e) {}
      } catch (_e) {}
    }
    async function getLeaderboard({ scope = 'all_time', metric = 'total', limit = 50 } = {}) {
      let col;
      if (scope === 'daily') col = metric === 'avg' ? 'daily_avg' : 'daily_pts';
      else col = metric === 'avg' ? 'avg_score' : 'total_pts';
      let q = sb.from('user_profiles').select('*').gt(col, 0).order(col, { ascending: false }).limit(limit);
      if (scope === 'daily') q = q.eq('daily_date', new Date().toISOString().slice(0, 10));
      const { data } = await q;
      return data ?? [];
    }
    async function searchUsersByName(query, limit = 20) {
      if (!query?.trim()) return [];
      const uid = await getUserId();
      const q = query.trim().replace(/[%_]/g, '');
      let req = sb.from('user_profiles').select('*').ilike('display_name', `%${q}%`)
        .order('total_pts', { ascending: false }).limit(limit);
      if (uid) req = req.neq('id', uid);
      const { data } = await req;
      return data ?? [];
    }
    async function getUserProfileById(userId) {
      const { data } = await sb.from('user_profiles').select('*').eq('id', userId).maybeSingle();
      return data;
    }
    async function getUserTopSessions(userId, limit = 3) {
      // If user has pinned specific sessions, return those (in pinned order).
      // Otherwise fall back to top-N by pts.
      const { data: profile } = await sb.from('user_profiles')
        .select('pinned_session_ids').eq('id', userId).maybeSingle();
      const pinnedIds = profile?.pinned_session_ids ?? null;
      if (pinnedIds && pinnedIds.length > 0) {
        const { data } = await sb.from('sessions').select('data').in('id', pinnedIds);
        const byId = Object.fromEntries((data ?? []).map(r => [r.data?.id, r.data]).filter(([id]) => id));
        return pinnedIds.map(id => byId[id]).filter(Boolean).slice(0, limit);
      }
      const { data } = await sb.from('sessions').select('data').eq('user_id', userId).order('created_at', { ascending: false }).limit(50);
      const sessions = (data ?? []).map(r => r.data).filter(Boolean);
      return sessions.map(s => ({ ...s, _pts: calcTotal(s) }))
        .sort((a, b) => b._pts - a._pts).slice(0, limit);
    }
    async function updatePinnedSessions(ids) {
      const uid = await getUserId();
      if (!uid) return;
      try {
        await sb.from('user_profiles').update({ pinned_session_ids: ids }).eq('id', uid);
      } catch (_e) {}
    }
    async function getFriendStatusWith(otherId) {
      const uid = await getUserId();
      if (!uid) return 'none';
      const { data } = await sb.from('friendships').select('*')
        .or(`and(requester_id.eq.${uid},addressee_id.eq.${otherId}),and(requester_id.eq.${otherId},addressee_id.eq.${uid})`)
        .maybeSingle();
      if (!data) return 'none';
      if (data.status === 'accepted') return 'accepted';
      if (data.requester_id === uid) return 'sent';
      return 'received';
    }
    async function sendFriendRequest(targetId) {
      const uid = await getUserId();
      if (!uid || uid === targetId) return false;
      const { error } = await sb.from('friendships').upsert(
        { requester_id: uid, addressee_id: targetId, status: 'pending' },
        { onConflict: 'requester_id,addressee_id' }
      );
      return !error;
    }
    async function acceptFriendRequest(id) {
      const { error } = await sb.from('friendships').update({ status: 'accepted', updated_at: new Date().toISOString() }).eq('id', id);
      return !error;
    }
    async function removeFriendship(id) {

    async function getFriendships() {
      const uid = await getUserId();
      if (!uid) return [];
      const { data } = await sb.from('friendships').select('*').or(`requester_id.eq.${uid},addressee_id.eq.${uid}`);
      return data ?? [];
    }
    async function getFriendsList() {
      const uid = await getUserId();
      if (!uid) return [];
      const ships = await getFriendships();
      const accepted = ships.filter(f => f.status === 'accepted');
      if (!accepted.length) return [];
      const ids = accepted.map(f => f.requester_id === uid ? f.addressee_id : f.requester_id);
      const { data: profiles } = await sb.from('user_profiles').select('*').in('id', ids);
      return (profiles ?? []).map(p => {
        const ship = accepted.find(f => f.requester_id === p.id || f.addressee_id === p.id);
        return { ...p, friendship_id: ship.id };
      });
    }
    async function getPendingRequests() {
      const uid = await getUserId();
      if (!uid) return [];
      const { data: ships } = await sb.from('friendships').select('*').eq('addressee_id', uid).eq('status', 'pending');
      if (!ships?.length) return [];
      const ids = ships.map(s => s.requester_id);
      const { data: profiles } = await sb.from('user_profiles').select('*').in('id', ids);
      return (profiles ?? []).map(p => {
        const ship = ships.find(s => s.requester_id === p.id);
        return { ...p, friendship_id: ship.id };
      });
    }
    async function getFriendsFeed(limit = 30) {
      const friends = await getFriendsList();
      if (!friends.length) return [];
      const ids = friends.map(f => f.id);
      const byId = Object.fromEntries(friends.map(f => [f.id, f]));
      const { data } = await sb.from('sessions').select('user_id, data, created_at')
        .in('user_id', ids).order('created_at', { ascending: false }).limit(limit);
      return (data ?? []).map(r => ({ user: byId[r.user_id], session: r.data, created_at: r.created_at }))
        .filter(x => x.user && x.session);
    }

          .in('session_id', sessionIds);

    // ─── Share Card (Strava + BeReal style) ──────────────────────────────────
    async function generateShareImageBlob(session, photos = []) {
      const W = 1080, H = 1920;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');

      // Background
      const pts = calcTotal(session);
      const c = scoreColor(session.averageWorkScore);
      const zone = getZone(session.averageWorkScore).label;
      const coverUrl = photos.find(p => p?.startsWith('https://')) || (session.photoUri?.startsWith('https://') ? session.photoUri : null);

      ctx.fillStyle = '#0a0a0a';
      ctx.fillRect(0, 0, W, H);

      let usedPhoto = false;
      if (coverUrl) {
        try {
          const img = await new Promise((res, rej) => {
            const i = new Image();
            i.crossOrigin = 'anonymous';
            i.onload = () => res(i);
            i.onerror = rej;
            i.src = coverUrl;
          });
          const ar = img.width / img.height;
          let dw = W, dh = W / ar;
          if (dh < H) { dh = H; dw = H * ar; }
          ctx.drawImage(img, (W - dw) / 2, (H - dh) / 2, dw, dh);
          usedPhoto = true;
        } catch (_e) { /* fallback to solid bg */ }
      }

      if (!usedPhoto) {
        // Solid background with score-color glow
        const rg = ctx.createRadialGradient(W/2, H*0.45, 50, W/2, H*0.45, W);
        rg.addColorStop(0, c.replace('rgb(', 'rgba(').replace(')', ',0.32)'));
        rg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = rg;
        ctx.fillRect(0, 0, W, H);
      }

      // Dark gradient bottom
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0,    'rgba(0,0,0,0.45)');
      g.addColorStop(0.35, 'rgba(0,0,0,0.10)');
      g.addColorStop(0.65, 'rgba(0,0,0,0.40)');
      g.addColorStop(1,    'rgba(0,0,0,0.95)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      const PAD = 64;

      // Top: surzo logo + date
      ctx.font = '900 56px Inter, system-ui';
      ctx.textBaseline = 'top';
      ctx.fillStyle = '#fff';
      ctx.fillText('sur', PAD, PAD);
      const sw = ctx.measureText('sur').width;
      ctx.fillStyle = '#d4f57a';
      ctx.fillText('z', PAD + sw, PAD);
      const szw = ctx.measureText('z').width;
      ctx.fillStyle = '#fff';
      ctx.fillText('o', PAD + sw + szw, PAD);

      const dateStr = new Date(session.endedAt || session.startedAt).toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric' });
      ctx.font = '600 28px Inter, system-ui';
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.textAlign = 'right';
      ctx.fillText(dateStr, W - PAD, PAD + 14);
      ctx.textAlign = 'left';

      // If no photo, draw score circle in middle
      if (!usedPhoto) {
        const cx = W / 2, cy = H * 0.40, r = 220;
        ctx.lineWidth = 28;
        ctx.strokeStyle = c.replace('rgb(', 'rgba(').replace(')', ',0.14)');
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
        ctx.strokeStyle = c;
        ctx.lineCap = 'round';
        const pct = Math.min(session.averageWorkScore / 100, 1);
        ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI/2, -Math.PI/2 + pct * Math.PI * 2); ctx.stroke();
      }

      // Bottom block: zone, score, stats, title
      const bottomY = H - PAD;
      let y = bottomY;

      // Tagline
      ctx.font = '700 24px Inter, system-ui';
      ctx.fillStyle = 'rgba(255,255,255,0.40)';
      ctx.fillText('YOUR FOCUS, MEASURED.', PAD, y - 24);
      y -= 80;

      // Title + category
      ctx.font = '600 30px Inter, system-ui';
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      const meta = `${session.category} · ${fmtMin(session.durationMinutes)}`;
      ctx.fillText(meta, PAD, y - 30);
      y -= 70;

      ctx.font = '800 50px Inter, system-ui';
      ctx.fillStyle = '#fff';
      const title = session.title.length > 30 ? session.title.slice(0, 30) + '…' : session.title;
      ctx.fillText(title, PAD, y - 52);
      y -= 100;

      // Score (huge)
      ctx.font = '900 280px Inter, system-ui';
      ctx.fillStyle = c;
      const scoreStr = String(session.averageWorkScore);
      ctx.fillText(scoreStr, PAD - 10, y - 240);
      const scoreW = ctx.measureText(scoreStr).width;

      // Zone label to the right of the score (vertically centered with score's lower part)
      ctx.font = '900 32px Inter, system-ui';
      ctx.fillStyle = c;
      ctx.fillText(zone, PAD + scoreW + 20, y - 200);

      ctx.font = '700 26px Inter, system-ui';
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.fillText('WORK SCORE', PAD + scoreW + 20, y - 160);

      // Side stats
      ctx.font = '900 60px Inter, system-ui';
      ctx.fillStyle = '#fff';
      const ptsStr = fmtPts(pts);
      ctx.fillText(ptsStr, PAD + scoreW + 20, y - 100);
      ctx.font = '700 22px Inter, system-ui';
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.fillText('PTS', PAD + scoreW + 20 + ctx.measureText(ptsStr).width + 10, y - 70);

      return new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.92));
    }

    async function shareSession(session, photos = []) {
      const pts = calcTotal(session);
      const text = `${session.title}\nスコア: ${session.averageWorkScore} · ${fmtMin(session.durationMinutes)} · ${fmtPts(pts)} pts\n— Surzo`;
      const firstPhoto = photos.find(p => p?.startsWith('https://')) || (session.photoUri?.startsWith('https://') ? session.photoUri : null);

      if (firstPhoto && navigator.canShare) {
        try {
          const res = await fetch(firstPhoto);
          const blob = await res.blob();
          const file = new File([blob], 'surzo-session.jpg', { type: blob.type || 'image/jpeg' });
          if (navigator.canShare({ files: [file] })) {
            await navigator.share({ files: [file], title: 'Surzo', text });
            return;
          }
        } catch (_e) {}
      }
      if (navigator.share) {
        try { await navigator.share({ title: 'Surzo', text }); return; } catch (_e) {}
      }
      try { await navigator.clipboard.writeText(text); alert('テキストをコピーしました'); }
      catch (_e) { alert('共有がサポートされていません'); }
    }

    // ─── Focus Timeline (mirrors PC version) ─────────────────────────────────
    function FocusTimeline({ series }) {
      if (!series || series.length < 2) return null;
      const W = 320, H = 76, PAD = 6;
      const maxT = series[series.length - 1].t || 1;
      const pts = series.map(({ t, s }) => ({
        x: PAD + (t / maxT) * (W - PAD * 2),
        y: PAD + (1 - s / 100) * (H - PAD * 2),
      }));
      const smooth = (ps) => {
        if (ps.length < 2) return '';
        const seg = [`M${ps[0].x.toFixed(1)},${ps[0].y.toFixed(1)}`];
        for (let i = 0; i < ps.length - 1; i++) {
          const p0=ps[Math.max(0,i-1)],p1=ps[i],p2=ps[i+1],p3=ps[Math.min(ps.length-1,i+2)];
          seg.push(`C${(p1.x+(p2.x-p0.x)/6).toFixed(1)},${(p1.y+(p2.y-p0.y)/6).toFixed(1)} ${(p2.x-(p3.x-p1.x)/6).toFixed(1)},${(p2.y-(p3.y-p1.y)/6).toFixed(1)} ${p2.x.toFixed(1)},${p2.y.toFixed(1)}`);
        }
        return seg.join(' ');
      };
      const d    = smooth(pts);
      const area = `${d} L${pts[pts.length-1].x},${H} L${pts[0].x},${H} Z`;
      const last = series[series.length - 1].s;
      const color = last >= 70 ? '#d4f57a' : last >= 40 ? '#ffd60a' : '#ff453a';
      const y40   = (PAD + (1 - 0.4) * (H - PAD * 2)).toFixed(1);
      const y70   = (PAD + (1 - 0.7) * (H - PAD * 2)).toFixed(1);
      return (
        <div className="bg-zinc-900 rounded-2xl p-4 mb-3">
          <div className="text-[10px] font-bold tracking-widest text-zinc-600 mb-3">FOCUS TIMELINE</div>
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full" style={{ height: 76 }} preserveAspectRatio="none">
            <line x1={PAD} y1={y70} x2={W-PAD} y2={y70} stroke="#d4f57a" strokeOpacity="0.2" strokeWidth="1" strokeDasharray="3,3" />
            <line x1={PAD} y1={y40} x2={W-PAD} y2={y40} stroke="#ffd60a" strokeOpacity="0.2" strokeWidth="1" strokeDasharray="3,3" />
            <path d={area} fill={color} fillOpacity="0.08" />
            <path d={d} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
          </svg>
          <div className="flex justify-between text-[10px] text-zinc-700 mt-1 px-0.5">
            <span>0m</span><span>{maxT}m</span>
          </div>
        </div>
      );
    }

    function ShareModal({ session, photos, onClose }) {
      const [cachedFile, setCachedFile] = useState(null);
      const [imgUrl, setImgUrl] = useState(null);
      const [generating, setGenerating] = useState(true);
      const fileName = `surzo-${session.id}.jpg`;

      // Pre-generate blob on mount so navigator.share can be called sync on user click
      useEffect(() => {
        let mounted = true;
        let url = null;
        setGenerating(true);
        generateShareImageBlob(session, photos)
          .then(blob => {
            if (!mounted || !blob) { setGenerating(false); return; }
            const file = new File([blob], fileName, { type: 'image/jpeg' });
            url = URL.createObjectURL(blob);
            setCachedFile(file);
            setImgUrl(url);
            setGenerating(false);
          })
          .catch(() => { if (mounted) setGenerating(false); });
        return () => { mounted = false; if (url) URL.revokeObjectURL(url); };
      }, [session.id]);

      // 「画像を保存」 — uses Web Share with file-only so iOS offers
      // "Save Image" → goes to Photos (not Files). On desktop, falls back to download.
      const handleSave = () => {
        if (!cachedFile) return;
        if (navigator.canShare && navigator.canShare({ files: [cachedFile] })) {
          navigator.share({ files: [cachedFile] }).catch(() => {});
          return;
        }
        // Desktop / non-iOS fallback: download
        try {
          const url = URL.createObjectURL(cachedFile);
          const a = document.createElement('a');
          a.href = url;
          a.download = fileName;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(url), 4000);
        } catch (_e) {}
      };

      // Keep synchronous — Web Share API must be inside the user gesture
      // Image-only share: passing ONLY files (no text/url) makes apps like Snapchat,
      // Instagram, Messages receive it as a PHOTO, not a link.
      const handleShare = () => {
        if (cachedFile && navigator.canShare && navigator.canShare({ files: [cachedFile] })) {
          navigator.share({ files: [cachedFile] }).catch((err) => {
            if (err?.name === 'AbortError') return; // user cancelled
            // Fall back to text+url share
            const text = `${session.title}\nWork Score: ${session.averageWorkScore}`;
            if (navigator.share) navigator.share({ title: 'Surzo', text, url: 'https://surzo-app.vercel.app' }).catch(() => {});
          });
          return;
        }
        // No file available — text/url fallback
        const text = `${session.title}\nWork Score: ${session.averageWorkScore} · ${fmtMin(session.durationMinutes)}`;
        const url = 'https://surzo-app.vercel.app';
        if (navigator.share) {
          navigator.share({ title: 'Surzo', text, url }).catch(() => {});
          return;
        }
        navigator.clipboard.writeText(`${text}\n${url}`).then(() => alert('テキストをコピーしました')).catch(() => alert('共有がサポートされていません'));
      };

      return (
        <div className="fixed inset-0 z-50 flex flex-col" style={{ background: 'rgba(0,0,0,0.92)', backdropFilter: 'blur(20px)' }}>
          {/* Header */}
          <div className="flex items-center justify-between px-5 pt-safe pb-3" style={{ paddingTop: 'calc(env(safe-area-inset-top, 0) + 12px)' }}>
            <button onClick={onClose} className="text-white text-2xl w-10 h-10 flex items-center justify-center">×</button>
            <span className="text-white text-sm font-semibold">セッションを共有</span>
            <div className="w-10" />
          </div>

          {/* Card preview — shows the ACTUAL generated image so users can long-press to "Save to Photos" */}
          <div className="flex-1 overflow-y-auto px-6 py-4 flex flex-col items-center justify-center min-h-0">
            <div style={{ width: '100%', maxWidth: 320 }}>
              {imgUrl ? (
                <img src={imgUrl} alt=""
                  className="w-full rounded-3xl shadow-2xl"
                  style={{ aspectRatio: '9/16', objectFit: 'cover', WebkitTouchCallout: 'default' }} />
              ) : (
                <div className="w-full rounded-3xl flex items-center justify-center bg-zinc-900"
                  style={{ aspectRatio: '9/16' }}>
                  <div className="w-7 h-7 border-2 border-zinc-700 border-t-lime-300 rounded-full spin" />
                </div>
              )}
              <p className="text-center text-[11px] text-zinc-500 mt-3">画像を長押し → 「写真に保存」で保存できます</p>
            </div>
          </div>

          {/* Actions */}
          <div className="px-5 pb-6 nav-pb" style={{ paddingBottom: 'calc(env(safe-area-inset-bottom, 0) + 16px)' }}>
            {generating && (
              <div className="text-center text-zinc-500 text-xs mb-3 flex items-center justify-center gap-2">
                <div className="w-3 h-3 border-2 border-zinc-700 border-t-lime-300 rounded-full spin" />
                <span>画像を生成中...</span>
              </div>
            )}
            <button onClick={handleShare}
              className="w-full rounded-2xl py-4 font-black text-sm active:scale-[.98] transition-all mb-2 flex items-center justify-center gap-2"
              style={{ background: '#d4f57a', color: '#000' }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
              </svg>
              他のアプリで共有 (Apple)
            </button>
            <div className="grid grid-cols-2 gap-2 mb-2">
              <button onClick={handleSave} disabled={generating || !cachedFile}
                className="rounded-2xl py-3.5 font-bold text-sm active:scale-[.98] transition-all disabled:opacity-50"
                style={{ background: 'rgba(255,255,255,0.08)', color: '#fff' }}>
                画像を保存
              </button>
              <button
                onClick={() => navigator.clipboard.writeText(`${session.title} · スコア ${session.averageWorkScore}\nhttps://surzo-app.vercel.app`).then(() => alert('コピーしました')).catch(() => {})}
                className="rounded-2xl py-3.5 font-bold text-sm active:scale-[.98] transition-all"
                style={{ background: 'rgba(255,255,255,0.08)', color: '#fff' }}>
                テキストをコピー
              </button>
            </div>
            <div className="grid grid-cols-3 gap-2">
              <a href={`https://twitter.com/intent/tweet?text=${encodeURIComponent(`${session.title} · スコア ${session.averageWorkScore} · ${fmtMin(session.durationMinutes)}\n— Surzo`)}&url=${encodeURIComponent('https://surzo-app.vercel.app')}`}
                target="_blank" rel="noopener"
                className="rounded-2xl py-3 font-bold text-xs text-center active:scale-[.98] transition-all"
                style={{ background: 'rgba(255,255,255,0.08)', color: '#fff' }}>X</a>
              <a href={`https://www.threads.net/intent/post?text=${encodeURIComponent(`${session.title} · スコア ${session.averageWorkScore}`)}`}
                target="_blank" rel="noopener"
                className="rounded-2xl py-3 font-bold text-xs text-center active:scale-[.98] transition-all"
                style={{ background: 'rgba(255,255,255,0.08)', color: '#fff' }}>Threads</a>
              <a href={`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent('https://surzo-app.vercel.app')}&text=${encodeURIComponent(`${session.title} · スコア ${session.averageWorkScore}`)}`}
                target="_blank" rel="noopener"
                className="rounded-2xl py-3 font-bold text-xs text-center active:scale-[.98] transition-all"
                style={{ background: 'rgba(255,255,255,0.08)', color: '#fff' }}>LINE</a>
            </div>
          </div>
        </div>
      );
    }

    // ─── Auth Screen ─────────────────────────────────────────────────────────
    function AuthScreen() {
      const [mode, setMode] = useState('login');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState(null);
      const [loading, setLoading] = useState(false);
      const [done, setDone] = useState(false);

      const submit = async (e) => {
        e.preventDefault();
        setLoading(true); setError(null);
        if (mode === 'login') {
          const { error } = await sb.auth.signInWithPassword({ email, password });
          if (error) setError(error.message);
        } else {
          const { data, error } = await sb.auth.signUp({ email, password });
          if (error) setError(error.message);
          else {
            if (data.session) await sb.auth.signOut();
            setDone(true);
          }
        }
        setLoading(false);
      };

      if (done) {
        return (
          <div className="flex items-center justify-center px-6 text-center" style={{ minHeight: '100%' }}>
            <div className="max-w-xs">
              <div className="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-5"
                style={{ background: 'rgba(212,245,122,0.1)', border: '1px solid rgba(212,245,122,0.2)' }}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#d4f57a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

                </svg>
              </div>
              <h2 className="text-xl font-black mb-2 tracking-tight">確認メールを送りました</h2>
              <p className="text-zinc-500 text-sm leading-relaxed mb-1">{email}</p>
              <p className="text-zinc-600 text-sm leading-relaxed">メール内のリンクをクリックして、アカウントを有効化してください。</p>
              <button onClick={() => { setDone(false); setMode('login'); }}
                className="mt-7 text-sm font-semibold text-lime-300">ログインに戻る →</button>
            </div>
          </div>
        );
      }

      return (
        <div className="flex items-center justify-center px-6 pt-safe" style={{ minHeight: '100%' }}>
          <div className="w-full max-w-sm fadein">
            <div className="mb-9 text-center">
              <SurzoLogo size={42} />
              <p className="text-zinc-600 text-xs mt-2 tracking-widest uppercase">Your focus, measured.</p>
            </div>
            <h2 className="text-2xl font-black mb-6 tracking-tight">{mode === 'login' ? 'ログイン' : 'アカウント作成'}</h2>
            <form onSubmit={submit} className="flex flex-col gap-3">
              <input type="email" placeholder="メールアドレス" required value={email}
                onChange={e => setEmail(e.target.value)}
                className="bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-3.5 outline-none focus:border-lime-300 transition-colors" />
              <input type="password" placeholder="パスワード（8文字以上）" required minLength={8} value={password}
                onChange={e => setPassword(e.target.value)}
                className="bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-3.5 outline-none focus:border-lime-300 transition-colors" />
              {error && <p className="text-red-400 text-xs px-1">{error}</p>}
              <button type="submit" disabled={loading}
                className="bg-lime-300 active:scale-[.98] text-zinc-950 font-black py-3.5 rounded-2xl transition-all disabled:opacity-50 mt-1">
                {loading ? '...' : mode === 'login' ? 'ログイン' : 'アカウント作成'}
              </button>
            </form>
            <button onClick={() => { setMode(m => m === 'login' ? 'signup' : 'login'); setError(null); }}
              className="w-full text-center text-zinc-500 text-sm mt-6">
              {mode === 'login' ? 'アカウントをお持ちでない方はこちら' : 'すでにアカウントをお持ちの方'}
            </button>
          </div>
        </div>
      );
    }

    // ─── PC Live View ────────────────────────────────────────────────────────
    function PcLiveView({ session, onStop, checkActive, onCheckPhone }) {
      const [uploading, setUploading] = useState(false);
      const [livePhotos, setLivePhotos] = useState([]);
      const pcCheckActive = checkActive;

      const score = session?.score ?? 50;
      const zone = getZone(score);
      const elapsed = session?.elapsed ?? 0;
      const planned = session?.planned_minutes ?? 0;
      const progress = planned > 0 ? Math.min(100, (elapsed/60/planned)*100) : 0;

      const togglePhone = () => onCheckPhone?.();

      const onPickPhoto = async (file) => {
        if (!file || livePhotos.length >= 3) return;
        const localUrl = URL.createObjectURL(file);
        setLivePhotos(p => [...p, localUrl].slice(0,3));
        setUploading(true);
        try {
          const url = await uploadPhoto(session.session_id, file);
          if (url?.startsWith('https://')) {
            setLivePhotos(p => p.map(x => x === localUrl ? url : x));
            await addSessionPhoto(session.session_id, url);
          }
        } catch (_e) {}
        setUploading(false);
      };

      return (
        <div className="px-5 pt-3 safe-pb">

                <div className="text-[10px] font-bold tracking-widest text-zinc-600 mb-1.5">{Math.round(progress)}%</div>

              color: pcCheckActive ? '#d4f57a' : '#a1a1aa',
            }}>
            {pcCheckActive ? '✓ 戻る' : 'スマホを確認'}

          <div className="mb-2.5" style={{ paddingBottom: 80 }}>
            <PhotoSection photos={livePhotos} onPick={onPickPhoto} disabled={uploading} />

    // ─── Mobile Session ──────────────────────────────────────────────────────
    function MobileSession({ session, onUpdate, onEnd, onPhoto, checkActive, onCheckPhone }) {
      const [uploading, setUploading] = useState(false);
      const ongoingMins = session.phoneStart ? (Date.now() - session.phoneStart)/60000 : 0;
      const score = calcLiveScore(session.elapsed/60, session.phoneCount, session.phoneMins + ongoingMins);
      const zone = getZone(score);
      const progress = session.plannedMinutes > 0 ? Math.min(100, (session.elapsed/60/session.plannedMinutes)*100) : 0;
      const photos = session.photos || [];

      const onPickPhoto = async (file) => {
        if (!file || photos.length >= 3) return;
        const localUrl = URL.createObjectURL(file);
        onPhoto(localUrl);
        setUploading(true);
        try {
          const url = await uploadPhoto(session.id, file);
          if (url?.startsWith('https://')) {
            onUpdate(prev => prev ? { ...prev, photos: (prev.photos || []).map(p => p === localUrl ? url : p) } : prev);
            await addSessionPhoto(session.id, url);
          }
        } catch (_e) {}
        setUploading(false);
      };

      return (
        <div className="px-5 pt-3 safe-pb">
          <div className="flex items-center gap-2 mb-7">
            <div className="w-2 h-2 rounded-full anim-blink" style={{ background: '#d4f57a' }} />
            <span className="text-[10px] font-extrabold tracking-[3px] text-zinc-600">LIVE</span>
            {session.title && <span className="text-xs text-zinc-500 truncate">{session.title}</span>}
          </div>

          <div className="text-center mb-7">
            <div className="text-[11px] font-extrabold tracking-[3px] mb-2" style={{ color: zone.color }}>{zone.label}</div>
            <div style={{ fontSize: 112, fontWeight: 900, lineHeight: 1, letterSpacing: -4, color: zone.color, fontVariantNumeric: 'tabular-nums' }}>{score}</div>
            <div className="h-1 mt-3 rounded-full overflow-hidden bg-zinc-900">
              <div className="h-full rounded-full transition-all" style={{ width: `${score}%`, background: zone.color, opacity: 0.7 }} />
            </div>
          </div>

          <div className="bg-zinc-900 rounded-2xl px-5 py-4 flex items-center justify-between mb-2.5">
            <div style={{ fontSize: 38, fontWeight: 900, fontVariantNumeric: 'tabular-nums', letterSpacing: -1, lineHeight: 1 }}>
              {fmtTimer(session.elapsed)}
            </div>
            {session.plannedMinutes > 0 && (
              <div className="text-right">
                <div className="text-[10px] font-bold tracking-widest text-zinc-600 mb-1.5">{Math.round(progress)}%</div>
                <div className="w-16 h-1 rounded-full overflow-hidden bg-zinc-800">
                  <div className="h-full" style={{ width: `${progress}%`, background: '#d4f57a', opacity: 0.55 }} />
                </div>
                <div className="text-[10px] text-zinc-700 mt-1">{session.plannedMinutes}m</div>
              </div>
            )}
          </div>

          <div className="bg-zinc-900 rounded-2xl px-5 py-4 flex items-center justify-between mb-2.5">
            <div className="text-[10px] font-bold tracking-widest text-zinc-600">スマホ離脱</div>
            <div className="font-black tabular-nums"
              style={{ fontSize: 24, color: session.phoneCount > 0 ? '#fb923c' : '#3f3f46' }}>
              {session.phoneCount} 回
            </div>
          </div>

          <button onClick={onCheckPhone}
            className="w-full rounded-2xl py-4 font-bold text-sm transition-all active:scale-[.98] mb-2.5"
            style={{
              background: checkActive ? 'rgba(212,245,122,0.15)' : '#111',
              border: checkActive ? '1px solid rgba(212,245,122,0.3)' : '1px solid transparent',
              color: checkActive ? '#d4f57a' : '#a1a1aa',
            }}>
            {checkActive ? '✓ 戻る' : 'スマホを確認'}
          </button>

          <div className="mb-2.5">
            <PhotoSection photos={photos} onPick={onPickPhoto} disabled={uploading} />
          </div>

          <button onClick={onEnd}
            className="w-full bg-zinc-900 rounded-2xl py-4 text-sm font-bold text-red-400 active:scale-[.99] transition-all">
            セッションを終了
          </button>
        </div>
      );
    }

    // ─── Profile Card Modal ──────────────────────────────────────────────────
    function ProfileCardModal({ userId, onClose, onChanged }) {
      const [profile, setProfile] = useState(null);
      const [tops, setTops] = useState([]);
      const [status, setStatus] = useState('none');
      const [busy, setBusy] = useState(false);
      const [loading, setLoading] = useState(true);
      const [myId, setMyId] = useState(null);

      useEffect(() => {
        let mounted = true;
        (async () => {
          const uid = await getUserId();
          if (!mounted) return;
          setMyId(uid);
          const isSelf = uid === userId;
          const [p, s, t] = await Promise.all([
            getUserProfileById(userId),
            isSelf ? Promise.resolve('self') : getFriendStatusWith(userId),
            getUserTopSessions(userId, 3),
          ]);
          if (!mounted) return;
          setProfile(p);
          setStatus(isSelf ? 'self' : s);
          setTops(t);
          setLoading(false);
        })();
        return () => { mounted = false; };
      }, [userId]);

      const handleAdd = async () => {
        setBusy(true);
        await sendFriendRequest(userId);
        setStatus('sent');
        setBusy(false);
        onChanged?.();
      };
      const handleAccept = async () => {
        setBusy(true);
        const ships = await getFriendships();
        const ship = ships.find(s => s.requester_id === userId && s.addressee_id === myId);
        if (ship) await acceptFriendRequest(ship.id);
        setStatus('accepted');
        setBusy(false);
        onChanged?.();
      };
      const handleRemove = async () => {
        setBusy(true);
        const ships = await getFriendships();
        const ship = ships.find(s =>
          (s.requester_id === userId && s.addressee_id === myId) ||
          (s.requester_id === myId && s.addressee_id === userId));
        if (ship) await removeFriendship(ship.id);
        setStatus('none');
        setBusy(false);
        onChanged?.();
      };

      const name = profile?.display_name || profile?.email_handle || '?';
      const initials = name.slice(0, 2).toUpperCase();

      return (
        <div className="fixed inset-0 z-50 flex items-end justify-center"
          style={{ background: 'rgba(0,0,0,0.65)', backdropFilter: 'blur(8px)' }}
          onClick={onClose}>
          <div onClick={e => e.stopPropagation()}
            className="w-full max-w-md bg-zinc-950 rounded-t-3xl p-6 fadein max-h-[92vh] overflow-y-auto"
            style={{ paddingBottom: 'calc(env(safe-area-inset-bottom, 0) + 24px)' }}>
            <div className="w-12 h-1 bg-zinc-800 rounded-full mx-auto mb-5" />

            {loading ? (
              <div className="text-center py-10 text-zinc-500 text-sm">読み込み中…</div>
            ) : !profile ? (
              <div className="text-center py-10 text-zinc-500 text-sm">プロフィールが見つかりません</div>
            ) : (
              <>
                <div className="flex items-center gap-4 mb-5">
                  <button onClick={async () => {
                    if (status !== 'accepted') return;
                    if (confirm(`${name} さんをフレンドから削除しますか？`)) await handleRemove();
                  }} className="w-16 h-16 rounded-2xl flex items-center justify-center flex-shrink-0 text-2xl font-black overflow-hidden active:scale-95 transition-transform"
                    style={{ background: '#d4f57a', color: '#000' }}>
                    {profile.avatar_url ? (
                      <img src={profile.avatar_url} alt="" className="w-full h-full object-cover" />
                    ) : initials}
                  </button>
                  <div className="flex-1 min-w-0">
                    <div className="text-xl font-black tracking-tight truncate">{name}</div>
                    <div className="text-zinc-600 text-xs mt-0.5">
                      {profile.flag_emoji || '🌐'} {profile.country || '—'}
                      {status === 'accepted' && <span className="ml-1.5 text-zinc-700">· アイコンを押して削除</span>}
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-3 gap-2 mb-5">
                  <div className="text-center py-3 rounded-2xl bg-zinc-900">
                    <div className="text-zinc-600 text-[10px] font-bold tracking-widest mb-1">SESSIONS</div>
                    <div className="font-black tabular-nums" style={{ fontSize: 22 }}>{profile.sessions_count || 0}</div>
                  </div>
                  <div className="text-center py-3 rounded-2xl bg-zinc-900">
                    <div className="text-zinc-600 text-[10px] font-bold tracking-widest mb-1">AVG</div>
                    <div className="font-black tabular-nums" style={{ fontSize: 22, color: scoreColor(profile.avg_score) }}>{profile.avg_score || '—'}</div>
                  </div>
                  <div className="text-center py-3 rounded-2xl bg-zinc-900">
                    <div className="text-zinc-600 text-[10px] font-bold tracking-widest mb-1">TOTAL</div>
                    <div className="font-black tabular-nums" style={{ fontSize: 22, color: '#d4f57a' }}>{fmtPts(profile.total_pts || 0)}</div>
                  </div>
                </div>

                {tops.length > 0 ? (
                  <>
                    <div className="text-zinc-600 text-[10px] font-bold tracking-widest mb-2.5">TOP SESSIONS</div>
                    <div className="grid grid-cols-3 gap-2 mb-5">
                      {tops.map(s => {
                        const c = scoreColor(s.averageWorkScore);
                        return (
                          <div key={s.id} className="rounded-2xl overflow-hidden relative bg-zinc-900" style={{ aspectRatio: '3/4' }}>
                            {s.photoUri?.startsWith('https://') ? (
                              <>
                                <img src={s.photoUri} className="absolute inset-0 w-full h-full object-cover" alt="" />
                                <div className="absolute inset-0" style={{ background: 'linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.85) 100%)' }} />

                                  <div className="font-black tabular-nums text-base leading-none" style={{ color: c }}>{s.averageWorkScore}</div>
                                  <div className="text-[9px] font-semibold mt-1 truncate text-white/70">{s.title}</div>
                                </div>
                              </>
                            ) : (
                              <div className="flex flex-col items-center justify-center h-full p-2">
                                <div className="font-black tabular-nums" style={{ fontSize: 28, color: c }}>{s.averageWorkScore}</div>

                          </div>

                    </div>
                  </>
                ) : status === 'accepted' ? (

                ) : null}

                {status === 'self' ? (

                    className="w-full bg-zinc-900 text-zinc-400 font-bold py-3.5 rounded-2xl">閉じる</button>

                    className="w-full bg-zinc-900 text-zinc-400 font-bold py-3.5 rounded-2xl">

              </>

          </div>
        </div>
      );

    // ─── Friends Screen (BeReal-style feed + list + requests) ───────────────
    function timeAgo(iso) {
      const d = new Date(iso);
      const secs = Math.floor((Date.now() - d.getTime()) / 1000);
      if (secs < 60) return 'たった今';
      const m = Math.floor(secs / 60);
      if (m < 60) return `${m}分前`;
      const h = Math.floor(m / 60);
      if (h < 24) return `${h}時間前`;
      const days = Math.floor(h / 24);
      if (days < 7) return `${days}日前`;
      return d.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric' });
    }

    function fnv32(str) {
      let h = 2166136261;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = (Math.imul(h, 16777619)) >>> 0;
      }
      return h / 4294967295;
    }

    function getRankRows(scope, period, metric) {
      let base = scope === 'フレンド' ? FRIENDS_DATA
               : scope === '国別'    ? COUNTRY_DATA
               : RANK_BASE;
      const mult = { '1h':0.02, '1日':0.12, '1週':0.6, '1月':1, '1年':5 }[period] ?? 1;
      base = base.map(u => {
        const momentum = 0.55 + fnv32(u.id + period) * 0.90;
        const avgShift = 0.88 + fnv32(u.id + period + 'a') * 0.24;
        return {
          ...u,
          displayScore: metric === '合計'
            ? Math.round(u.total * mult * momentum)
            : Math.max(30, Math.min(99, Math.round(u.avg * avgShift))),
          displaySessions: Math.max(1, Math.round(u.sessions * mult * momentum)),
        };
      });
      return [...base].sort((a, b) => b.displayScore - a.displayScore);
    }

    // ─── Track Screen ────────────────────────────────────────────────────────
    function TrackScreen({ resetSignal }) {
      const [pcSession, setPcSession] = useState(null);
      const [mobileSession, setMobileSession] = useState(null);
      const [stoppingPc, setStoppingPc] = useState(false);
      const [doneSession, setDoneSession] = useState(null);
      const [checkActive, setCheckActive] = useState(false);
      const timerRef = useRef(null);
      const checkRef = useRef(false);
      const checkStartRef = useRef(null);
      const fetchRef = useRef(null);
      const prevPcRef = useRef(null);
      const bgStartRef = useRef(null);
      const firstResetRef = useRef(true);

      // Reset done-session screen when user taps Track tab while already on it.
      // Active mobile session is NOT reset (don't kill ongoing work).
      // StartScreen receives resetSignal and resets its own mode internally.
      useEffect(() => {
        if (firstResetRef.current) { firstResetRef.current = false; return; }
        setDoneSession(null);
      }, [resetSignal]);

      useEffect(() => {
        let mounted = true;
        let channel = null;
        async function fetchOne() {
          try {
            const uid = await getUserId();
            if (!uid || !mounted) return;
            const { data } = await sb.from('live_sessions').select('*').eq('user_id', uid).maybeSingle();
            if (!mounted) return;
            if (data?.updated_at) {
              const age = Date.now() - new Date(data.updated_at).getTime();
              if (age > 10*60*1000) {
                sb.from('live_sessions').delete().eq('user_id', uid).then(() => {});
                setPcSession(null);
                return;
              }
            }
            setPcSession(data ?? null);
          } catch (_e) {}
        }
        fetchRef.current = fetchOne;
        async function setup() {
          let uid = null;
          for (let i = 0; i < 8 && !uid && mounted; i++) {
            uid = await getUserId();
            if (!uid) await new Promise(r => setTimeout(r, 500));
          }
          await fetchOne();
          if (!uid || !mounted) return;
          channel = sb.channel(`live-${uid}`)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'live_sessions', filter: `user_id=eq.${uid}` },
              (p) => { if (mounted) setPcSession(p.eventType === 'DELETE' ? null : p.new); })
            .subscribe();
        }
        setup();
        const poll = setInterval(fetchOne, 2500);
        return () => { mounted = false; clearInterval(poll); if (channel) sb.removeChannel(channel); };
      }, []);

      useEffect(() => {
        if (prevPcRef.current && !pcSession) {
          setStoppingPc(true);
          setTimeout(() => {
            getSessions().then(ss => {
              setStoppingPc(false);
              if (ss?.length) {
                const sorted = [...ss].sort((a,b) => (b.startedAt||0) - (a.startedAt||0));
                setDoneSession(sorted[0]);
              }
            }).catch(() => setStoppingPc(false));
          }, 4000);
        }
        if (pcSession) setStoppingPc(false);
        prevPcRef.current = pcSession;
      }, [pcSession]);

      useEffect(() => {
        if (mobileSession && !timerRef.current) {
          timerRef.current = setInterval(() => {
            setMobileSession(prev => {
              if (!prev) return prev;
              const elapsed = prev.elapsed + 1;
              const elapsedMin = Math.floor(elapsed / 60);
              const liveScore = calcLiveScore(elapsed/60, prev.phoneCount, prev.phoneMins);
              let scoreSeries = prev.scoreSeries || [];
              let lastSeriesMin = prev.lastSeriesMin ?? -1;
              if (elapsedMin > lastSeriesMin && elapsedMin > 0) {
                scoreSeries = [...scoreSeries, { t: elapsedMin, s: liveScore }];
                lastSeriesMin = elapsedMin;
              }
              return { ...prev, elapsed, scoreSeries, lastSeriesMin };
            });
          }, 1000);
        }
        if (!mobileSession && timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; }
        return () => { if (timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; } };
      }, [!!mobileSession]);

      // Keep auth cache warm whenever a session is active (refresh periodically + on session change)
      useEffect(() => {
        const has = !!(mobileSession || pcSession);
        if (!has) return;
        refreshAuthCache();
        const id = setInterval(refreshAuthCache, 30 * 1000); // refresh every 30s
        return () => clearInterval(id);
      }, [!!mobileSession, !!pcSession]);

      // ─── PC session phone tracking via broadcast ───────────────────────────
      // - Heartbeat ('hb') every 2s while visible → PC knows mobile is here
      // - Explicit 'leave' broadcast when going hidden → PC counts distraction IMMEDIATELY
      // - Explicit 'back' broadcast when becoming visible → PC ends distraction
      // - PC's gap-detection (6s) is a safety net for when broadcasts don't make it
      useEffect(() => {
        if (!pcSession?.session_id) return;
        const pcId = pcSession.session_id;
        let interval = null;
        let wakeLock = null;
        let chReady = false;

        const ch = sb.channel(`hb-${pcId}`);
        const send = (event, payload = {}) => {
          if (!chReady) return;
          try { ch.send({ type: 'broadcast', event, payload }); } catch (_e) {}
        };
        ch.subscribe((status) => {
          if (status !== 'SUBSCRIBED') return;
          chReady = true;
          const beat = () => {
            if (document.hidden || checkRef.current) return;
            send('hb', { ts: Date.now() });
          };
          beat();
          interval = setInterval(beat, 2000);
        });

        // Immediate signaling on visibility transitions
        const onVis = () => {
          if (document.hidden) {
            send('leave', { ts: Date.now() });
            // Also persist as a phone_event so PC's polling/realtime picks it up
            // (broadcast is unreliable when page suspends)
            sendPhoneEvent(pcId, 'start').catch(() => {});
            sendPhoneEventBeacon(pcId, 'start'); // keepalive backup
          } else {
            send('back', { ts: Date.now() });
            sendPhoneEvent(pcId, 'end').catch(() => {});
          }
          // Wake lock re-acquire when becoming visible (iOS releases on hide)
          if (!document.hidden && 'wakeLock' in navigator) {
            navigator.wakeLock.request('screen').then(w => { wakeLock = w; }).catch(() => {});
          }
        };
        document.addEventListener('visibilitychange', onVis);

        // Best-effort signal on iOS suspend
        const onPageHide = () => {
          send('leave', { ts: Date.now() });
          sendPhoneEventBeacon(pcId, 'start');
        };
        window.addEventListener('pagehide', onPageHide);

        // Initial wake lock
        if ('wakeLock' in navigator) {
          navigator.wakeLock.request('screen').then(w => { wakeLock = w; }).catch(() => {});
        }

        return () => {
          if (interval) clearInterval(interval);
          document.removeEventListener('visibilitychange', onVis);
          window.removeEventListener('pagehide', onPageHide);
          try { wakeLock?.release(); } catch (_e) {}
          sb.removeChannel(ch);
        };
      }, [pcSession?.session_id]);

      // When user taps "スマホを確認" while in PC view, signal a manual leave/back
      useEffect(() => {
        if (!pcSession?.session_id) return;
        const pcId = pcSession.session_id;
        const ch = sb.channel(`hb-${pcId}`);
        ch.subscribe();
        try {
          ch.send({ type: 'broadcast', event: checkActive ? 'leave' : 'back', payload: { manual: true } });
        } catch (_e) {}
        return () => { sb.removeChannel(ch); };
      }, [checkActive, pcSession?.session_id]);

      useEffect(() => {
        const has = !!(mobileSession || pcSession);
        if (!has) return;
        const pcId = pcSession?.session_id;
        const hasMobile = !!mobileSession;
        // Restore from sessionStorage if iOS reloaded the page while we were away
        const stored = sessionStorage.getItem('surzo-bg-start');
        if (stored && !bgStartRef.current) bgStartRef.current = parseInt(stored, 10) || null;

        const goAway = () => {
          if (checkRef.current) return; // intentional check phone, skip
          if (bgStartRef.current) return; // already tracking
          const ts = Date.now();
          bgStartRef.current = ts;
          sessionStorage.setItem('surzo-bg-start', String(ts));
          // Best-effort send to PC immediately — may fail if iOS suspends, but comeBack will recover
          if (pcId) sendPhoneEventBeacon(pcId, 'start');
        };

        const comeBack = () => {
          if (checkRef.current) {
            const mins = (Date.now() - (checkStartRef.current || Date.now())) / 60000;
            checkRef.current = false;
            checkStartRef.current = null;
            setCheckActive(false);
            setMobileSession(prev => prev ? { ...prev, phoneMins: prev.phoneMins + mins } : prev);
            return;
          }
          if (!bgStartRef.current) return;
          const awayMs = Date.now() - bgStartRef.current;
          bgStartRef.current = null;
          sessionStorage.removeItem('surzo-bg-start');
          const mins = awayMs / 60000;
          const significant = mins > 0.05; // >3s counts as distraction
          if (significant && hasMobile) {
            setMobileSession(prev => prev ? {
              ...prev,
              phoneCount: prev.phoneCount + 1,
              phoneMins: prev.phoneMins + mins,
            } : prev);
          }
          if (pcId && significant) {
            // Always send both start AND end on return — PC rejects duplicate start (so no double count),
            // but if the beacon on goAway failed, this guarantees the distraction is recorded.
            (async () => {
              try { await sendPhoneEvent(pcId, 'start'); } catch (_e) {}
              try { await sendPhoneEvent(pcId, 'end');   } catch (_e) {}
            })();
          }
        };

        const onVis  = () => { document.hidden ? goAway() : comeBack(); };
        const onBlur = () => goAway();
        const onFocus = () => comeBack();
        const onPageHide = () => goAway();
        const onPageShow = () => comeBack();

        document.addEventListener('visibilitychange', onVis);
        window.addEventListener('blur', onBlur);
        window.addEventListener('focus', onFocus);
        window.addEventListener('pagehide', onPageHide);
        window.addEventListener('pageshow', onPageShow);

        // If we restored a bg-start from sessionStorage (page came back after a reload), process it now
        if (bgStartRef.current && !document.hidden) {
          setTimeout(() => comeBack(), 50);
        }

        return () => {
          document.removeEventListener('visibilitychange', onVis);
          window.removeEventListener('blur', onBlur);
          window.removeEventListener('focus', onFocus);
          window.removeEventListener('pagehide', onPageHide);
          window.removeEventListener('pageshow', onPageShow);
        };
      }, [!!mobileSession, !!pcSession, pcSession?.session_id]);

      const startPhone = (cfg) => {
        setMobileSession({
          id: genId(), ...cfg,
          startedAt: Date.now(), elapsed: 0,
          phoneCount: 0, phoneMins: 0, photos: [],
          scoreSeries: [], lastSeriesMin: -1,
        });
      };
      const startMac = async (cfg) => {
        await sendSessionCommand('start', { ...cfg, trackPhone: true });
        fetchRef.current?.();
        setTimeout(() => fetchRef.current?.(), 1500);
        setTimeout(() => fetchRef.current?.(), 3500);
      };
      const handleCheckPhone = () => {
        if (!checkRef.current) {
          checkRef.current = true;
          checkStartRef.current = Date.now();
          setCheckActive(true);
          setMobileSession(prev => prev ? { ...prev, phoneCount: prev.phoneCount + 1 } : prev);
        } else {
          const mins = (Date.now() - checkStartRef.current) / 60000;
          checkRef.current = false;
          checkStartRef.current = null;
          setCheckActive(false);
          setMobileSession(prev => prev ? { ...prev, phoneMins: prev.phoneMins + mins } : prev);
        }
      };
      const handlePhoto = (uri) => {
        setMobileSession(prev => prev ? { ...prev, photos: [...(prev.photos || []), uri].slice(0,3) } : prev);
      };
      const handleStopPc = async () => {
        setStoppingPc(true);
        try { await sendSessionCommand('stop', {}); } catch (_e) { setStoppingPc(false); return; }
        setTimeout(async () => {
          const uid = await getUserId();
          if (!uid) return;
          const { data } = await sb.from('live_sessions').select('session_id').eq('user_id', uid).maybeSingle();
          if (data) { await sb.from('live_sessions').delete().eq('user_id', uid); setPcSession(null); }
        }, 8000);
      };
      const handleEnd = async () => {
        if (!mobileSession) return;
        clearInterval(timerRef.current);
        timerRef.current = null;
        const durMin = Math.max(1, Math.round(mobileSession.elapsed / 60));
        const score = calcMobileScore(durMin, mobileSession.phoneCount, mobileSession.phoneMins);
        const { pos, neg, breakdown } = buildFeedback(durMin, mobileSession.phoneCount, mobileSession.phoneMins, score);
        const result = {
          id: mobileSession.id,
          title: mobileSession.title, category: mobileSession.category, plannedMinutes: mobileSession.plannedMinutes,
          startedAt: mobileSession.startedAt, endedAt: Date.now(),
          durationMinutes: durMin, averageWorkScore: score,
          totalWorkScore: Math.round(durMin * score),
          bestFocusMinutes: Math.max(1, durMin - Math.round(mobileSession.phoneMins)),
          deepWorkBlocks: durMin >= 25 && mobileSession.phoneCount <= 1 ? 1 : 0,
          phoneDistractionCount: mobileSession.phoneCount,
          totalPhoneDistractionMinutes: Math.round(mobileSession.phoneMins * 10) / 10,
          scoreBreakdown: breakdown, positiveReasons: pos, negativeReasons: neg,
          scoreSeries: mobileSession.scoreSeries || [],
          source: 'mobile-web',
          photoUri: (mobileSession.photos || []).find(p => p?.startsWith('https://')) ?? null,
        };
        try { await saveSession(result); refreshMyProfileStats().catch(() => {}); } catch (_e) {}
        setMobileSession(null);
        setDoneSession(result);
      };

      if (doneSession) return <SessionDetail session={doneSession} onBack={() => setDoneSession(null)} />;
      if (mobileSession) return <MobileSession session={mobileSession} onUpdate={setMobileSession} onEnd={handleEnd} onPhoto={handlePhoto} checkActive={checkActive} onCheckPhone={handleCheckPhone} />;
      if (pcSession) return <PcLiveView session={pcSession} onStop={handleStopPc} checkActive={checkActive} onCheckPhone={handleCheckPhone} />;
      if (stoppingPc) {
        return (
          <div className="flex flex-col items-center justify-center" style={{ minHeight: '100%' }}>
            <div className="w-8 h-8 border-2 border-zinc-700 border-t-lime-300 rounded-full spin" />
            <p className="text-zinc-500 mt-4 text-sm font-semibold">記録を取得中...</p>
          </div>
        );
      }
      return <StartScreen onStartPhone={startPhone} onStartMac={startMac} resetSignal={resetSignal} />;
    }

    // ─── App ─────────────────────────────────────────────────────────────────
    function App() {
      const [authed, setAuthed] = useState(null);
      const [tab, setTab] = useState('track');
      const [detailSession, setDetailSession] = useState(null);
      const [showOnboarding, setShowOnboarding] = useState(false);
      const [recordsKey, setRecordsKey] = useState(0);
      const [resetSignal, setResetSignal] = useState(0);
      const [profileUserId, setProfileUserId] = useState(null);

      useEffect(() => {
        sb.auth.getSession().then(({ data }) => setAuthed(!!data.session));
        const { data: { subscription } } = sb.auth.onAuthStateChange((_, session) => setAuthed(!!session));
        return () => subscription.unsubscribe();
      }, []);

      useEffect(() => {
        if (authed && !localStorage.getItem(ONBOARDING_KEY)) {
          setShowOnboarding(true);
        }
        if (authed) {
          ensureMyProfile().then(() => refreshMyProfileStats()).catch(() => {});
        }
      }, [authed]);

      // App-level PC session detection — runs regardless of which tab is open.
      // When a new PC session appears (e.g. Mac started one locally), auto-switch to Track tab.
      const [globalPcLive, setGlobalPcLive] = useState(false);
      const prevGlobalPcRef = useRef(false);
      useEffect(() => {
        if (!authed) return;
        let mounted = true;
        let channel = null;
        const fetchOne = async () => {
          try {
            const uid = await getUserId();
            if (!uid || !mounted) return;
            const { data } = await sb.from('live_sessions').select('session_id, updated_at').eq('user_id', uid).maybeSingle();
            if (!mounted) return;
            const alive = data && data.updated_at && (Date.now() - new Date(data.updated_at).getTime() < 10 * 60 * 1000);
            setGlobalPcLive(!!alive);
          } catch (_e) {}
        };
        fetchOne();
        const poll = setInterval(fetchOne, 3000);
        (async () => {
          const uid = await getUserId();
          if (!uid || !mounted) return;
          channel = sb.channel(`app-live-${uid}`)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'live_sessions', filter: `user_id=eq.${uid}` },
              () => fetchOne()).subscribe();
        })();
        return () => { mounted = false; clearInterval(poll); if (channel) sb.removeChannel(channel); };
      }, [authed]);

      // Auto-switch to Track when a fresh PC session appears
      useEffect(() => {
        if (globalPcLive && !prevGlobalPcRef.current) {
          setTab('track');
          setDetailSession(null);
        }
        prevGlobalPcRef.current = globalPcLive;
      }, [globalPcLive]);

      const closeOnboarding = () => {
        localStorage.setItem(ONBOARDING_KEY, '1');
        setShowOnboarding(false);
      };

      if (authed === null) return null;
      if (!authed) return <div className="scroll-area"><AuthScreen /></div>;

      const handleSessionUpdated = (updated) => {
        setDetailSession(updated);
        setRecordsKey(k => k + 1);
      };

      const handleTabChange = (next) => {
        if (next === tab) {
          if (detailSession) setDetailSession(null);
          if (profileUserId) setProfileUserId(null);
          setResetSignal(s => s + 1);
        } else {
          setTab(next);
          setDetailSession(null);
        }
      };

      const renderTab = () => {
        if (detailSession) {
          return <SessionDetail session={detailSession} onBack={() => setDetailSession(null)} onUpdated={handleSessionUpdated} />;
        }
        if (tab === 'track')   return <TrackScreen resetSignal={resetSignal} />;
        if (tab === 'records') return <RecordsScreen key={recordsKey} onDetail={setDetailSession} />;
        if (tab === 'friends') return <FriendsScreen onSelectUser={setProfileUserId} />;
        if (tab === 'ranking') return <RankingScreen onSelectUser={setProfileUserId} />;
        if (tab === 'profile') return <ProfileScreen onShowOnboarding={() => setShowOnboarding(true)} />;
        return null;
      };

      return (
        <>
          <div className="scroll-area">
            {renderTab()}
          </div>
          <BottomNav tab={tab} onChange={handleTabChange} />
          {showOnboarding && <Onboarding onClose={closeOnboarding} />}
          {profileUserId && (
            <ProfileCardModal userId={profileUserId} onClose={() => setProfileUserId(null)} onChanged={() => setRecordsKey(k => k + 1)} />
          )}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
