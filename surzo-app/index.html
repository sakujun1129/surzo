<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surzo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      box-sizing: border-box;
    }
    html, body { margin: 0; padding: 0; background: #09090b; min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #18181b; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 2px; }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 2px; background: #3f3f46; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px;
      border-radius: 50%; background: #a3e635; cursor: pointer;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
    .anim-blink { animation: blink 1.8s ease-in-out infinite; }
    @keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .fadein { animation: fadein .22s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── Constants ───────────────────────────────────────────────────────────
    const CATEGORIES = [
      'Writing', 'Programming', 'Design', 'Research',
      'Video Editing', 'Study', 'Admin / Email', 'Free Work',
    ];

    const CAT_ICON = {
      'Writing': '✍️', 'Programming': '💻', 'Design': '🎨',
      'Research': '🔍', 'Video Editing': '🎬', 'Study': '📚',
      'Admin / Email': '📧', 'Free Work': '⚡',
    };

    const FOCUS_LABELS = {
      'very-focused': 'Very focused',
      'focused': 'Focused',
      'mixed': 'Mixed',
      'not-focused': 'Not focused',
    };

    const PROGRESS_LABELS = {
      'completed': 'Completed',
      'good-progress': 'Good progress',
      'some-progress': 'Some progress',
      'little-progress': 'Little progress',
    };

    const STORAGE_KEY = 'surzo_v1';

    // ─── Utilities ───────────────────────────────────────────────────────────
    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2);
    }

    function hashStr(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) {
        h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
      }
      return Math.abs(h);
    }

    function fmtTimer(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function fmtMin(min) {
      if (min < 60) return `${Math.round(min)}m`;
      const h = Math.floor(min / 60);
      const m = Math.round(min % 60);
      return m > 0 ? `${h}h ${m}m` : `${h}h`;
    }

    function isToday(ts) {
      const d = new Date(ts), n = new Date();
      return d.getFullYear() === n.getFullYear() &&
             d.getMonth() === n.getMonth() &&
             d.getDate() === n.getDate();
    }

    function scoreText(s) {
      if (s >= 80) return 'text-lime-400';
      if (s >= 65) return 'text-emerald-400';
      if (s >= 50) return 'text-yellow-400';
      return 'text-orange-400';
    }

    function scoreBg(s) {
      if (s >= 80) return 'bg-lime-400';
      if (s >= 65) return 'bg-emerald-400';
      if (s >= 50) return 'bg-yellow-400';
      return 'bg-orange-400';
    }

    // ─── Scoring ─────────────────────────────────────────────────────────────
    function mockSubs(id) {
      const h = hashStr(id);
      return {
        focusConsistency:  60 + (h % 31),
        taskAlignment:     65 + ((h >>> 4) % 31),
        deepWorkRatio:     45 + ((h >>> 8) % 41),
        recoveryReturn:    55 + ((h >>> 12) % 31),
        distractionPenalty: 5 + ((h >>> 16) % 16),
      };
    }

    function computeScore(id, durMin, phoneCount, phoneMin) {
      const sub = mockSubs(id);
      const base =
        0.30 * sub.focusConsistency +
        0.25 * sub.taskAlignment +
        0.20 * sub.deepWorkRatio +
        0.15 * sub.recoveryReturn -
        0.10 * sub.distractionPenalty;
      const pp  = Math.min(15, phoneCount * 2 + phoneMin * 0.5);
      const avg = Math.round(Math.min(100, Math.max(0, base - pp)));
      const tot = Math.round(durMin * avg / 10 * 10) / 10;
      return {
        scoreBreakdown: {
          focusConsistency:       sub.focusConsistency,
          taskAlignment:          sub.taskAlignment,
          deepWorkRatio:          sub.deepWorkRatio,
          recoveryReturn:         sub.recoveryReturn,
          distractionPenalty:     sub.distractionPenalty,
          phoneDistractionPenalty: Math.round(pp * 10) / 10,
        },
        averageWorkScore: avg,
        totalWorkScore:   tot,
      };
    }

    function generateReasons(score, phoneCount, phoneMin) {
      const pos = [];
      const neg = [];

      if (score >= 80)      pos.push("Your focus was remarkably strong throughout this session.");
      else if (score >= 70) pos.push("You maintained solid momentum across the session.");
      else                  pos.push("You showed up and put in the work — that always counts.");

      if (phoneCount === 0)     pos.push("You stayed completely phone-free. That's rare and valuable.");
      else if (phoneCount <= 2) pos.push("You returned to work after each phone check — good recovery.");
      else                      pos.push("Noticing your phone habits is the first step to changing them.");

      if (score >= 70) pos.push("Your work rhythm stayed consistent with your intended task.");
      else             pos.push("Every session builds your focus capacity, even imperfect ones.");

      if (phoneCount >= 4)
        neg.push("Phone interruptions may have reduced your focus rhythm. Try keeping your phone out of arm's reach next time.");
      else if (phoneCount >= 2)
        neg.push("Phone interruptions may have reduced your focus rhythm.");

      if (phoneMin > 5)
        neg.push(`You spent ~${Math.round(phoneMin)} min on your phone. Next time, try one 5-minute phone-free block to build momentum.`);
      else if (score < 65)
        neg.push("Try setting one specific outcome before your next session to boost task alignment.");
      else if (phoneCount > 0)
        neg.push("Next time, try one 15-minute phone-free block to deepen your focus rhythm.");

      return {
        positiveReasons: pos.slice(0, 3),
        negativeReasons: neg.slice(0, 2),
      };
    }

    // ─── Storage ─────────────────────────────────────────────────────────────
    function loadSessions() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
      catch { return []; }
    }

    function saveSessions(sessions) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(sessions));
    }

    // ─── Shared UI ───────────────────────────────────────────────────────────
    function Card({ children, className }) {
      return <div className={`bg-zinc-900 rounded-2xl ${className || ''}`}>{children}</div>;
    }

    function StatTile({ label, value, sub, color }) {
      return (
        <Card className="p-4">
          <div className="text-zinc-500 text-xs uppercase tracking-widest mb-1">{label}</div>
          <div className={`text-2xl font-black tabular-nums ${color || 'text-white'}`}>{value}</div>
          {sub && <div className="text-zinc-600 text-xs mt-0.5">{sub}</div>}
        </Card>
      );
    }

    function ScoreBar({ value, max, negative }) {
      const pct = Math.min(100, (value / (max || 100)) * 100);
      return (
        <div className="h-1 bg-zinc-800 rounded-full overflow-hidden">
          <div
            className={`h-full rounded-full transition-all ${negative ? 'bg-orange-500/70' : scoreBg(value)}`}
            style={{ width: `${pct}%` }}
          />
        </div>
      );
    }

    // ─── Dashboard ───────────────────────────────────────────────────────────
    function Dashboard({ sessions, onStart }) {
      const today   = sessions.filter(s => isToday(s.startedAt));
      const recent  = [...sessions].sort((a, b) => b.startedAt - a.startedAt).slice(0, 5);
      const hasToday = today.length > 0;

      const workTime  = today.reduce((s, x) => s + x.durationMinutes, 0);
      const avgScore  = hasToday
        ? Math.round(today.reduce((s, x) => s + x.averageWorkScore, 0) / today.length)
        : 0;
      const totalWork = today.reduce((s, x) => s + x.totalWorkScore, 0);
      const phoneDist = today.reduce((s, x) => s + x.phoneDistractionCount, 0);

      return (
        <div className="min-h-screen bg-zinc-950 text-white">
          <div className="max-w-lg mx-auto px-4 py-8 fadein">
            {/* Header */}
            <div className="flex items-baseline justify-between mb-8">
              <div>
                <h1 className="text-3xl font-black tracking-tight">Surzo</h1>
                <p className="text-zinc-600 text-xs mt-0.5">Your focus, measured.</p>
              </div>
              <span className="text-zinc-700 text-xs">
                {new Date().toLocaleDateString('en', { weekday: 'short', month: 'short', day: 'numeric' })}
              </span>
            </div>

            {/* Today score */}
            <Card className="p-6 mb-3">
              <div className="text-zinc-500 text-xs uppercase tracking-widest mb-2">Today's Work Score</div>
              <div className={`text-7xl font-black tabular-nums leading-none ${hasToday ? scoreText(avgScore) : 'text-zinc-800'}`}>
                {hasToday ? avgScore : '—'}
              </div>
              {hasToday && (
                <div className="text-zinc-600 text-xs mt-2">
                  {today.length} session{today.length !== 1 ? 's' : ''} completed
                </div>
              )}
            </Card>

            {/* Stats row */}
            <div className="grid grid-cols-3 gap-3 mb-3">
              <StatTile label="Total Work" value={hasToday ? totalWork.toFixed(1) : '—'} sub={hasToday ? 'pts' : null} />
              <StatTile label="Work Time"  value={hasToday ? fmtMin(workTime) : '—'} />
              <StatTile
                label="Phone"
                value={hasToday ? String(phoneDist) : '—'}
                color={hasToday && phoneDist > 0 ? 'text-orange-400' : null}
                sub={hasToday && phoneDist === 0 ? 'clean 🎯' : null}
              />
            </div>

            <button
              onClick={onStart}
              className="w-full bg-lime-400 hover:bg-lime-300 active:scale-[.98] text-zinc-950 font-black text-lg py-4 rounded-2xl transition-all mb-6"
            >
              Start Session
            </button>

            {recent.length > 0 && (
              <>
                <div className="text-zinc-600 text-xs uppercase tracking-widest mb-3">Recent</div>
                <div className="space-y-2">
                  {recent.map(s => (
                    <Card key={s.id} className="px-4 py-3 flex items-center justify-between">
                      <div className="flex items-center gap-3">
                        <span className="text-xl">{CAT_ICON[s.category]}</span>
                        <div>
                          <div className="font-semibold text-sm leading-tight">{s.title}</div>
                          <div className="text-zinc-600 text-xs mt-0.5">
                            {fmtMin(s.durationMinutes)} · {new Date(s.startedAt).toLocaleDateString('en', { month: 'short', day: 'numeric' })}
                            {s.phoneDistractionCount > 0 && (
                              <span className="ml-1 text-orange-500">· 📱×{s.phoneDistractionCount}</span>
                            )}
                          </div>
                        </div>
                      </div>
                      <div className={`text-2xl font-black ${scoreText(s.averageWorkScore)}`}>
                        {s.averageWorkScore}
                      </div>
                    </Card>
                  ))}
                </div>
              </>
            )}

            {sessions.length === 0 && (
              <div className="text-center py-16 text-zinc-700">
                <div className="text-5xl mb-4">⚡</div>
                <p className="text-sm font-semibold">Start your first session.</p>
                <p className="text-xs mt-1 text-zinc-800">Track focus. Measure progress.</p>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ─── Start Session ────────────────────────────────────────────────────────
    function StartSession({ onStart, onBack }) {
      const [title, setTitle]               = useState('');
      const [category, setCategory]         = useState('Programming');
      const [plannedMinutes, setPlanned]    = useState(25);
      const [trackPhone, setTrackPhone]     = useState(true);

      return (
        <div className="min-h-screen bg-zinc-950 text-white">
          <div className="max-w-lg mx-auto px-4 py-8 fadein">
            <button onClick={onBack} className="text-zinc-600 hover:text-zinc-300 mb-6 flex items-center gap-1 text-sm transition-colors">
              ← Back
            </button>
            <h2 className="text-2xl font-black mb-5">New Session</h2>

            <div className="space-y-3">
              {/* Title */}
              <Card className="px-4 py-3">
                <div className="text-zinc-500 text-xs uppercase tracking-widest mb-1.5">
                  Title <span className="normal-case text-zinc-700">(optional)</span>
                </div>
                <input
                  type="text"
                  value={title}
                  onChange={e => setTitle(e.target.value)}
                  placeholder={`e.g. "${category} deep work"`}
                  className="w-full bg-transparent text-white text-base placeholder-zinc-700 outline-none"
                />
              </Card>

              {/* Category */}
              <Card className="p-4">
                <div className="text-zinc-500 text-xs uppercase tracking-widest mb-3">Category</div>
                <div className="grid grid-cols-2 gap-2">
                  {CATEGORIES.map(cat => (
                    <button
                      key={cat}
                      onClick={() => setCategory(cat)}
                      className={`flex items-center gap-2 px-3 py-2.5 rounded-xl text-sm font-semibold transition-colors text-left ${
                        category === cat
                          ? 'bg-lime-400 text-zinc-950'
                          : 'bg-zinc-800 text-zinc-300 hover:bg-zinc-700'
                      }`}
                    >
                      <span className="text-base">{CAT_ICON[cat]}</span>
                      <span>{cat}</span>
                    </button>
                  ))}
                </div>
              </Card>

              {/* Duration */}
              <Card className="p-4">
                <div className="flex justify-between items-baseline mb-3">
                  <div className="text-zinc-500 text-xs uppercase tracking-widest">Planned Duration</div>
                  <div className="text-white font-bold tabular-nums">{plannedMinutes} min</div>
                </div>
                <input
                  type="range" min={5} max={120} step={5}
                  value={plannedMinutes}
                  onChange={e => setPlanned(Number(e.target.value))}
                  className="w-full"
                />
                <div className="flex justify-between text-zinc-700 text-xs mt-2">
                  <span>5m</span><span>30m</span><span>1h</span><span>1.5h</span><span>2h</span>
                </div>
              </Card>

              {/* Phone toggle */}
              <button
                onClick={() => setTrackPhone(t => !t)}
                className="w-full bg-zinc-900 hover:bg-zinc-800 rounded-2xl px-4 py-3.5 flex items-center justify-between transition-colors"
              >
                <div className="text-left">
                  <div className="font-semibold text-sm">Track Phone Distractions</div>
                  <div className="text-zinc-500 text-xs mt-0.5">Log each time you check your phone</div>
                </div>
                <div className={`w-11 h-6 rounded-full transition-colors relative flex-shrink-0 ml-4 ${trackPhone ? 'bg-lime-400' : 'bg-zinc-700'}`}>
                  <span className={`absolute top-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform ${trackPhone ? 'translate-x-5' : 'translate-x-0.5'}`} />
                </div>
              </button>
            </div>

            <button
              onClick={() => onStart({ title: title.trim() || category, category, plannedMinutes, trackPhone })}
              className="w-full bg-lime-400 hover:bg-lime-300 active:scale-[.98] text-zinc-950 font-black text-lg py-4 rounded-2xl transition-all mt-4"
            >
              Start
            </button>
          </div>
        </div>
      );
    }

    // ─── Active Session ───────────────────────────────────────────────────────
    function ActiveSession({ session, onEnd }) {
      const [elapsed, setElapsed]     = useState(0);
      const [events, setEvents]       = useState([]);
      const [activeEvt, setActiveEvt] = useState(null);

      useEffect(() => {
        const id = setInterval(() => setElapsed(Math.floor((Date.now() - session.startedAt) / 1000)), 1000);
        return () => clearInterval(id);
      }, [session.startedAt]);

      const phoneCount = events.length + (activeEvt ? 1 : 0);
      const phoneMin   = events.reduce((s, e) => s + (e.durationSeconds || 0) / 60, 0);
      const sub        = mockSubs(session.id);
      const base       = 0.30 * sub.focusConsistency + 0.25 * sub.taskAlignment +
                         0.20 * sub.deepWorkRatio + 0.15 * sub.recoveryReturn -
                         0.10 * sub.distractionPenalty;
      const pp         = Math.min(15, phoneCount * 2 + phoneMin * 0.5);
      const liveScore  = Math.round(Math.min(100, Math.max(0, base - pp)));
      const progress   = Math.min(100, (elapsed / 60 / session.plannedMinutes) * 100);

      const checkPhone = () => {
        if (activeEvt) return;
        setActiveEvt({ id: genId(), startedAt: Date.now() });
      };

      const endPhone = () => {
        if (!activeEvt) return;
        const now = Date.now();
        const dur = Math.round((now - activeEvt.startedAt) / 1000);
        setEvents(prev => [...prev, { ...activeEvt, endedAt: now, durationSeconds: dur }]);
        setActiveEvt(null);
      };

      const endSession = () => {
        const final = activeEvt
          ? [...events, { ...activeEvt, endedAt: Date.now(), durationSeconds: Math.round((Date.now() - activeEvt.startedAt) / 1000) }]
          : events;
        onEnd(final);
      };

      return (
        <div className="min-h-screen bg-zinc-950 text-white">
          <div className="max-w-lg mx-auto px-4 py-8 fadein">
            <div className="flex items-center gap-2 mb-4">
              <span className="w-2 h-2 rounded-full bg-lime-400 anim-blink" />
              <span className="text-zinc-500 text-xs uppercase tracking-widest">Active Session</span>
            </div>

            <h2 className="text-xl font-bold leading-tight mb-1">{session.title}</h2>
            <div className="text-zinc-500 text-sm flex items-center gap-1 mb-5">
              <span>{CAT_ICON[session.category]}</span>
              <span>{session.category}</span>
              <span className="text-zinc-700 mx-1">·</span>
              <span>{session.plannedMinutes} min planned</span>
            </div>

            {/* Timer */}
            <Card className="p-6 text-center mb-3">
              <div className="text-zinc-500 text-xs uppercase tracking-widest mb-2">Time Elapsed</div>
              <div className="text-6xl font-black tabular-nums tracking-tight">{fmtTimer(elapsed)}</div>
              <div className="mt-3 h-1 bg-zinc-800 rounded-full overflow-hidden">
                <div className="h-full bg-lime-400/40 rounded-full transition-all" style={{ width: `${progress}%` }} />
              </div>
              <div className="text-zinc-700 text-xs mt-1.5 tabular-nums">
                {Math.round(progress)}% of {session.plannedMinutes} min planned
              </div>
            </Card>

            {/* Live score */}
            <Card className={`p-6 text-center mb-3 border ${liveScore >= 80 ? 'border-lime-400/20' : liveScore >= 65 ? 'border-emerald-400/15' : 'border-zinc-800'}`}>
              <div className="text-zinc-500 text-xs uppercase tracking-widest mb-2">Estimated Work Score</div>
              <div className={`text-7xl font-black tabular-nums anim-blink ${scoreText(liveScore)}`}>
                {liveScore}
              </div>
              <div className="text-zinc-700 text-xs mt-2">Live estimate · updates in real time</div>
            </Card>

            {/* Phone tracking */}
            {session.trackPhone && (
              <Card className="p-4 mb-3">
                <div className="flex items-center justify-between mb-3">
                  <div className="text-zinc-500 text-xs uppercase tracking-widest">Phone Distractions</div>
                  <div className={`font-black text-2xl tabular-nums ${phoneCount > 0 ? 'text-orange-400' : 'text-zinc-700'}`}>
                    {phoneCount}
                  </div>
                </div>

                {activeEvt && (
                  <div className="bg-orange-500/10 border border-orange-500/20 rounded-xl px-3 py-2 mb-3 text-xs text-orange-400 flex items-center gap-2">
                    <span className="anim-blink">📱</span>
                    <span>Phone check in progress…</span>
                  </div>
                )}

                <div className="grid grid-cols-2 gap-2">
                  <button
                    onClick={checkPhone}
                    disabled={!!activeEvt}
                    className={`py-3 px-2 rounded-xl text-sm font-semibold transition-colors ${
                      activeEvt
                        ? 'bg-zinc-800 text-zinc-700 cursor-not-allowed'
                        : 'bg-zinc-800 hover:bg-orange-500/15 hover:text-orange-300 text-zinc-400'
                    }`}
                  >
                    I checked my phone
                  </button>
                  <button
                    onClick={endPhone}
                    disabled={!activeEvt}
                    className={`py-3 px-2 rounded-xl text-sm font-semibold transition-colors ${
                      !activeEvt
                        ? 'bg-zinc-800 text-zinc-700 cursor-not-allowed'
                        : 'bg-orange-500/20 text-orange-300 hover:bg-orange-500/30'
                    }`}
                  >
                    Back to work
                  </button>
                </div>

                {events.length > 0 && (
                  <div className="mt-3 pt-3 border-t border-zinc-800 space-y-1">
                    {events.slice(-3).map((e, idx) => (
                      <div key={e.id} className="text-zinc-600 text-xs flex justify-between tabular-nums">
                        <span>Check #{events.findIndex(ev => ev.id === e.id) + 1}</span>
                        <span>{e.durationSeconds !== undefined ? `${e.durationSeconds}s` : '—'}</span>
                      </div>
                    ))}
                  </div>
                )}
              </Card>
            )}

            <button
              onClick={endSession}
              className="w-full bg-zinc-800 hover:bg-zinc-700 text-white font-bold text-lg py-4 rounded-2xl transition-colors"
            >
              End Session
            </button>
          </div>
        </div>
      );
    }

    // ─── Session Result ───────────────────────────────────────────────────────
    function SessionResult({ session, onSave, onDone }) {
      const [selfFocus,     setSelfFocus]     = useState(session.selfFocus || null);
      const [progressCheck, setProgressCheck] = useState(session.progressCheck || null);
      const [saved, setSaved]                 = useState(false);

      const handleSave = () => {
        onSave(selfFocus, progressCheck);
        setSaved(true);
      };

      const sb = session.scoreBreakdown;

      const breakdown = [
        { label: 'Focus Consistency',    value: sb.focusConsistency,       weight: '×0.30', negative: false, max: 100 },
        { label: 'Task Alignment',       value: sb.taskAlignment,           weight: '×0.25', negative: false, max: 100 },
        { label: 'Deep Work Ratio',      value: sb.deepWorkRatio,           weight: '×0.20', negative: false, max: 100 },
        { label: 'Recovery & Return',    value: sb.recoveryReturn,          weight: '×0.15', negative: false, max: 100 },
        { label: 'Distraction Penalty',  value: sb.distractionPenalty,     weight: '×0.10', negative: true,  max: 25  },
      ];
      if (session.trackPhone) {
        breakdown.push({ label: 'Phone Distraction Penalty', value: sb.phoneDistractionPenalty, weight: 'max 15', negative: true, max: 15 });
      }

      return (
        <div className="min-h-screen bg-zinc-950 text-white pb-8">
          <div className="max-w-lg mx-auto px-4 py-8 fadein">
            <h2 className="text-2xl font-black mb-5">Session Complete</h2>

            {/* Hero score */}
            <Card className="p-6 text-center mb-3">
              <div className="text-zinc-500 text-xs uppercase tracking-widest mb-2">Work Score</div>
              <div className={`text-8xl font-black tabular-nums leading-none ${scoreText(session.averageWorkScore)}`}>
                {session.averageWorkScore}
              </div>
              <div className="text-zinc-400 text-sm mt-3 font-medium">{session.title}</div>
              <div className="text-zinc-600 text-xs">{session.category} · {fmtMin(session.durationMinutes)}</div>
            </Card>

            {/* Stats grid */}
            <div className="grid grid-cols-2 gap-3 mb-3">
              <StatTile label="Total Work"  value={session.totalWorkScore.toFixed(1)} sub="points" />
              <StatTile label="Work Time"   value={fmtMin(session.durationMinutes)} />
              <StatTile label="Best Focus"  value={`${session.bestFocusMinutes}m`} sub="streak" />
              <StatTile label="Deep Work"   value={String(session.deepWorkBlocks)} sub="blocks" />
              {session.trackPhone && (
                <>
                  <StatTile
                    label="Phone Checks"
                    value={String(session.phoneDistractionCount)}
                    color={session.phoneDistractionCount > 0 ? 'text-orange-400' : 'text-lime-400'}
                    sub={session.phoneDistractionCount === 0 ? 'phone-free 🎯' : null}
                  />
                  <StatTile
                    label="Phone Time"
                    value={session.totalPhoneDistractionMinutes > 0 ? fmtMin(session.totalPhoneDistractionMinutes) : '—'}
                    color={session.totalPhoneDistractionMinutes > 0 ? 'text-orange-400' : 'text-zinc-600'}
                  />
                </>
              )}
            </div>

            {/* Score breakdown */}
            <Card className="p-4 mb-3">
              <div className="text-zinc-500 text-xs uppercase tracking-widest mb-4">Score Breakdown</div>
              <div className="space-y-3.5">
                {breakdown.map(({ label, value, weight, negative, max }) => (
                  <div key={label}>
                    <div className="flex justify-between items-baseline text-sm mb-1.5">
                      <span className={negative ? 'text-zinc-500' : 'text-zinc-300'}>{label}</span>
                      <span className={`font-bold tabular-nums ${negative ? 'text-orange-400' : 'text-white'}`}>
                        {negative ? `−${value}` : value}
                        <span className="text-zinc-700 text-xs font-normal ml-1.5">{weight}</span>
                      </span>
                    </div>
                    <ScoreBar value={value} max={max} negative={negative} />
                  </div>
                ))}
              </div>
            </Card>

            {/* Session notes */}
            <Card className="p-4 mb-3">
              <div className="text-zinc-500 text-xs uppercase tracking-widest mb-3">Session Notes</div>
              <div className="space-y-2.5">
                {session.positiveReasons.map((r, i) => (
                  <div key={i} className="flex gap-2.5 text-sm">
                    <span className="text-lime-400 font-black mt-px flex-shrink-0">+</span>
                    <span className="text-zinc-300 leading-snug">{r}</span>
                  </div>
                ))}
              </div>
              {session.negativeReasons.length > 0 && (
                <div className="space-y-2.5 mt-3 pt-3 border-t border-zinc-800">
                  {session.negativeReasons.map((r, i) => (
                    <div key={i} className="flex gap-2.5 text-sm">
                      <span className="text-zinc-600 mt-px flex-shrink-0">→</span>
                      <span className="text-zinc-500 leading-snug">{r}</span>
                    </div>
                  ))}
                </div>
              )}
            </Card>

            {/* Self Check */}
            <Card className="p-4 mb-3">
              <div className="text-zinc-500 text-xs uppercase tracking-widest mb-4">Self Check</div>

              <div className="mb-4">
                <p className="text-sm text-zinc-300 mb-2.5">How focused did this session feel?</p>
                <div className="grid grid-cols-2 gap-2">
                  {Object.keys(FOCUS_LABELS).map(opt => (
                    <button
                      key={opt}
                      onClick={() => setSelfFocus(opt)}
                      className={`py-2.5 px-3 rounded-xl text-sm font-semibold transition-colors ${
                        selfFocus === opt
                          ? 'bg-lime-400 text-zinc-950'
                          : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'
                      }`}
                    >
                      {FOCUS_LABELS[opt]}
                    </button>
                  ))}
                </div>
              </div>

              <div className="mb-4">
                <p className="text-sm text-zinc-300 mb-2.5">How much progress did you make?</p>
                <div className="grid grid-cols-2 gap-2">
                  {Object.keys(PROGRESS_LABELS).map(opt => (
                    <button
                      key={opt}
                      onClick={() => setProgressCheck(opt)}
                      className={`py-2.5 px-3 rounded-xl text-sm font-semibold transition-colors ${
                        progressCheck === opt
                          ? 'bg-lime-400 text-zinc-950'
                          : 'bg-zinc-800 text-zinc-400 hover:bg-zinc-700'
                      }`}
                    >
                      {PROGRESS_LABELS[opt]}
                    </button>
                  ))}
                </div>
              </div>

              <button
                onClick={handleSave}
                disabled={saved}
                className={`w-full py-3 rounded-xl text-sm font-black transition-colors ${
                  saved
                    ? 'bg-zinc-800 text-zinc-500 cursor-default'
                    : 'bg-lime-400 hover:bg-lime-300 text-zinc-950'
                }`}
              >
                {saved ? '✓ Saved' : 'Save Check-in'}
              </button>
            </Card>

            <button
              onClick={onDone}
              className="w-full bg-zinc-800 hover:bg-zinc-700 text-white font-bold text-lg py-4 rounded-2xl transition-colors"
            >
              Back to Dashboard
            </button>
          </div>
        </div>
      );
    }

    // ─── App ─────────────────────────────────────────────────────────────────
    function App() {
      const [screen,        setScreen]        = useState('dashboard');
      const [sessions,      setSessions]      = useState(() => loadSessions());
      const [activeSession, setActiveSession] = useState(null);
      const [doneSession,   setDoneSession]   = useState(null);

      const handleStartSession = ({ title, category, plannedMinutes, trackPhone }) => {
        const session = {
          id: genId(), title, category, plannedMinutes, trackPhone,
          startedAt: Date.now(), durationMinutes: 0,
          averageWorkScore: 0, totalWorkScore: 0,
          bestFocusMinutes: 0, deepWorkBlocks: 0,
          phoneDistractionCount: 0, totalPhoneDistractionMinutes: 0,
          scoreBreakdown: {
            focusConsistency: 0, taskAlignment: 0, deepWorkRatio: 0,
            recoveryReturn: 0, distractionPenalty: 0, phoneDistractionPenalty: 0,
          },
          positiveReasons: [], negativeReasons: [], phoneDistractionEvents: [],
        };
        setActiveSession(session);
        setScreen('active');
      };

      const handleEndSession = (phoneEvents) => {
        if (!activeSession) return;
        const endedAt    = Date.now();
        const durMin     = Math.max(1, Math.round((endedAt - activeSession.startedAt) / 60000));
        const phoneCount = phoneEvents.length;
        const phoneMin   = phoneEvents.reduce((s, e) => s + (e.durationSeconds || 0) / 60, 0);

        const { scoreBreakdown, averageWorkScore, totalWorkScore } =
          computeScore(activeSession.id, durMin, phoneCount, phoneMin);
        const { positiveReasons, negativeReasons } =
          generateReasons(averageWorkScore, phoneCount, phoneMin);

        const h = hashStr(activeSession.id);
        const bestFocus  = Math.min(durMin, 8 + (h % 18));
        const deepBlocks = Math.min(Math.floor(durMin / 15), 1 + ((h >>> 20) % 3));

        const completed = {
          ...activeSession, endedAt, durationMinutes: durMin,
          averageWorkScore, totalWorkScore,
          bestFocusMinutes: bestFocus, deepWorkBlocks: deepBlocks,
          phoneDistractionCount: phoneCount,
          totalPhoneDistractionMinutes: Math.round(phoneMin * 10) / 10,
          scoreBreakdown, positiveReasons, negativeReasons,
          phoneDistractionEvents: phoneEvents,
        };

        const updated = [...sessions, completed];
        setSessions(updated);
        saveSessions(updated);
        setActiveSession(null);
        setDoneSession(completed);
        setScreen('result');
      };

      const handleSaveCheckin = (focus, progress) => {
        if (!doneSession) return;
        const updated = { ...doneSession, selfFocus: focus, progressCheck: progress };
        setDoneSession(updated);
        const newList = sessions.map(s => s.id === updated.id ? updated : s);
        setSessions(newList);
        saveSessions(newList);
      };

      if (screen === 'start')
        return <StartSession onStart={handleStartSession} onBack={() => setScreen('dashboard')} />;

      if (screen === 'active' && activeSession)
        return <ActiveSession session={activeSession} onEnd={handleEndSession} />;

      if (screen === 'result' && doneSession)
        return (
          <SessionResult
            session={doneSession}
            onSave={handleSaveCheckin}
            onDone={() => { setDoneSession(null); setScreen('dashboard'); }}
          />
        );

      return <Dashboard sessions={sessions} onStart={() => setScreen('start')} />;
    }

    // ─── Mount ───────────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
