<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- macOS squircle clip -->
    <clipPath id="squircle">
      <path d="M 360 0
               L 664 0
               C 880 0 1024 144 1024 360
               L 1024 664
               C 1024 880 880 1024 664 1024
               L 360 1024
               C 144 1024 0 880 0 664
               L 0 360
               C 0 144 144 0 360 0 Z"/>
    </clipPath>

    <!-- Background: rich dark, warm top → cool bottom -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1c1c22"/>
      <stop offset="55%" stop-color="#0a0a0d"/>
      <stop offset="100%" stop-color="#040406"/>
    </linearGradient>

    <!-- Lime gradient with vertical sheen for the arc -->
    <linearGradient id="lime" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e9ff8e"/>
      <stop offset="48%"  stop-color="#d4f57a"/>
      <stop offset="100%" stop-color="#a8cf3e"/>
    </linearGradient>

    <!-- Center glow under arc -->
    <radialGradient id="centerGlow" cx="0.5" cy="0.55" r="0.45">
      <stop offset="0%"   stop-color="#d4f57a" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="#d4f57a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d4f57a" stop-opacity="0"/>
    </radialGradient>

    <!-- Top accent (very subtle) -->
    <radialGradient id="topAccent" cx="0.5" cy="-0.05" r="0.85">
      <stop offset="0%"   stop-color="#d4f57a" stop-opacity="0.16"/>
      <stop offset="60%"  stop-color="#d4f57a" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#d4f57a" stop-opacity="0"/>
    </radialGradient>

    <!-- Drop shadow for arc -->
    <filter id="arcShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.42"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#squircle)">
    <!-- Layers: base → top accent → halo -->
    <rect width="1024" height="1024" fill="url(#bg)"/>
    <rect width="1024" height="1024" fill="url(#topAccent)"/>
    <rect width="1024" height="1024" fill="url(#centerGlow)"/>

    <!-- Inner border for crisp edge -->
    <path d="M 360 4 L 664 4
             C 878 4 1020 146 1020 360
             L 1020 664
             C 1020 878 878 1020 664 1020
             L 360 1020
             C 146 1020 4 878 4 664
             L 4 360
             C 4 146 146 4 360 4 Z"
          fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>

    <!-- Background track ring (the "100% potential") -->
    <circle cx="512" cy="512" r="312"
            fill="none"
            stroke="#d4f57a" stroke-opacity="0.09"
            stroke-width="128"/>

    <!-- Active arc: 78% (~281°) progress, starts at top, sweeps clockwise -->
    <!-- 12 o'clock = (512, 200). End at ~292° (78%) = (512 + 312·sin(281°·π/180), 512 - 312·cos(281°·π/180))
         sin(281°) ≈ -0.9816, cos(281°) ≈ 0.1908
         x = 512 + 312·(-0.9816) ≈ 512 - 306.2 ≈ 205.8
         y = 512 - 312·0.1908 ≈ 512 - 59.5 ≈ 452.5
         arc large-arc-flag=1 (>180°), sweep-flag=1 (CW) -->
    <g filter="url(#arcShadow)">
      <path d="M 512 200 A 312 312 0 1 1 206 453"
            fill="none"
            stroke="url(#lime)"
            stroke-width="128"
            stroke-linecap="round"/>
    </g>

    <!-- Small bright dot at the start (12 o'clock) — subtle "start" marker -->
    <circle cx="512" cy="200" r="14" fill="#fff" opacity="0.95"/>
  </g>
</svg>
